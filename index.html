<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVODO – Customizer</title>

<style>

body{
    margin:0;
    background:#f3f3f3;
    font-family:Poppins, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* ======== PAPIER ======== */
.canvas{
    width:100%;
    max-width:520px;
    aspect-ratio:3/4;
    background:white;
    border-radius:22px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    position:relative;
    overflow:hidden;
}

/* ======== TRIČKO – perfektné vypasovanie ======== */
.shirt-wrapper{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

.shirt-wrapper svg{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* ======== RÁMČEK – jemné malé ružové bodky ======== */
.frame-wrapper{
    position:absolute;

    width:23.4%;        /* zmenšené o 10 % */
    aspect-ratio:1/1;

    top:42%;            /* posunuté nižšie */
    left:63%;           /* 🔥 posunuté viac doľava */
    transform:translate(-50%, -50%);

    pointer-events:none;
}

.frame-wrapper rect{
    fill:transparent;
    stroke:#ff7cc6;
    stroke-width:3;

    /* 🔥 OVEĽA VIAC MALÝCH BODIEK */
    stroke-dasharray:0.5 4;
    stroke-linecap:round;

    rx:10;
}


</style>
</head>

<body>

<div class="canvas">

    <!-- TRIČKO – tvoje SVG s tenšími čiarami -->
    <div class="shirt-wrapper">
        <svg viewBox="0 0 512 512">
            <path d="M314.56,48S291.78,56,256,56s-58.56-8-58.56-8a31.94,31.94,0,0,0-10.57,1.8L32,104l16.63,88,48.88,5.52A24,24,0,0,1,118.8,222.1L112,464H400l-6.8-241.9a24,24,0,0,1,21.29-24.58L463.37,192,480,104,325.13,49.8A31.94,31.94,0,0,0,314.56,48Z"
                style="fill:none;stroke:#000000;stroke-linecap:round;stroke-linejoin:round;stroke-width:4px"/>
            <path d="M333.31,52.66a80,80,0,0,1-154.62,0"
                style="fill:none;stroke:#000000;stroke-linecap:round;stroke-linejoin:round;stroke-width:4px"/>
        </svg>
    </div>

    <!-- RÁMČEK -->
    <div class="frame-wrapper">
        <svg viewBox="0 0 100 100">
            <rect x="0" y="0" width="100" height="100"></rect>
        </svg>
    </div>

</div>

</body>
</html>
