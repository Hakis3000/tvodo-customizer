<!-- TVODO CUSTOMIZER FINAL V3 PRO -->
<!-- ========================================= -->

<!DOCTYPE html>
<html lang="sk">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>TVODO - Personalizovaná výšivka</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@600;700&family=Fredoka:wght@500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

:root{
--pink:#ff7cc6;
--blue:#7dafff;
--bg1:#fff8fc;
--bg2:#eef5ff;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
overflow-x:hidden;
color:#222;
min-height:100vh;
}

/* BG */

body::before{
content:'';
position:fixed;
width:500px;
height:500px;
border-radius:50%;
background:var(--pink);
filter:blur(140px);
opacity:0.12;
top:-200px;
left:-200px;
z-index:-1;
}

body::after{
content:'';
position:fixed;
width:500px;
height:500px;
border-radius:50%;
background:var(--blue);
filter:blur(140px);
opacity:0.12;
bottom:-200px;
right:-200px;
z-index:-1;
}

/* MAIN */

.app{
display:grid;
grid-template-columns:minmax(0,1fr) 430px;
gap:24px;
padding:20px;
max-width:1800px;
margin:auto;
}

/* LEFT */

.left{
position:sticky;
top:20px;
height:calc(100vh - 40px);
transition:.35s;
}

/* HIDE HEADER ON SCROLL */

.left.compact .top-info{
opacity:0;
height:0;
overflow:hidden;
pointer-events:none;
margin:0;
}

.left.compact .product-bar{
margin-top:0;
}

/* CARD */

.preview-card{
height:100%;
border-radius:34px;
background:rgba(255,255,255,0.56);
backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,0.55);
box-shadow:0 20px 50px rgba(0,0,0,0.08);
padding:14px;
display:flex;
flex-direction:column;
gap:12px;
overflow:hidden;
}

/* HEADER */

.top-info{
transition:.35s;
}

.logo{
font-size:34px;
font-weight:700;
letter-spacing:-1px;
background:linear-gradient(90deg,var(--pink),var(--blue));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
line-height:1;
}

.logo-sub{
font-size:12px;
line-height:1.5;
color:#666;
margin-top:4px;
}

/* PRODUCT BAR */

.product-bar{
display:flex;
gap:10px;
overflow:auto;
padding-bottom:4px;
scrollbar-width:none;
transition:.35s;
}

.product-bar::-webkit-scrollbar{
display:none;
}

.product-btn{
min-width:145px;
border:none;
padding:14px;
border-radius:22px;
background:white;
cursor:pointer;
font-weight:600;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
transition:0.28s;
box-shadow:0 10px 24px rgba(0,0,0,0.06);
}

.product-btn:hover{
transform:translateY(-3px) scale(1.02);
}

.product-btn.active{
background:linear-gradient(135deg,var(--pink),var(--blue));
color:white;
}

.product-preview-icon{
width:68px;
height:68px;
object-fit:contain;
}

/* PREVIEW */

.preview-window{
flex:1;
border-radius:30px;
padding:20px;
background:
radial-gradient(circle at top left,rgba(255,255,255,0.85),transparent 40%),
radial-gradient(circle at bottom right,rgba(255,255,255,0.85),transparent 40%),
linear-gradient(135deg,#f4f7ff,#fff0f7);
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

.preview-window svg{
width:100%;
height:auto;
aspect-ratio:1/1;
max-width:760px;
transition:.3s;
}

#productImage{
transition:0.35s;
filter:drop-shadow(0 20px 30px rgba(0,0,0,0.08));
}

/* REMOVE FRAME */

.zone-frame{
display:none;
}

/* TEXT */

#embroideryText{
font-size:42px;
font-family:Montserrat;
font-weight:700;
fill:#ff7cc6;
text-anchor:middle;
dominant-baseline:middle;
paint-order:stroke;
stroke:rgba(255,255,255,0.35);
stroke-width:1.4;
transition:.2s;
}

/* SYMBOL */

#symbolLayer{
transition:0.25s;
}

/* RIGHT */

.right{
background:rgba(255,255,255,0.56);
backdrop-filter:blur(22px);
border-radius:34px;
padding:24px;
box-shadow:0 20px 50px rgba(0,0,0,0.06);
border:1px solid rgba(255,255,255,0.5);
overflow-y:auto;
}

/* TITLES */

.title{
font-size:38px;
font-weight:700;
line-height:1.08;
margin-bottom:10px;
background:linear-gradient(90deg,var(--pink),var(--blue));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:15px;
line-height:1.8;
color:#666;
margin-bottom:24px;
}

/* SECTION */

.section{
margin-top:24px;
}

.section-title{
font-size:16px;
font-weight:700;
margin-bottom:10px;
}

/* INPUT */

textarea{
width:100%;
min-height:120px;
border:none;
resize:none;
border-radius:24px;
padding:18px;
font-family:Poppins;
font-size:15px;
outline:none;
box-shadow:0 8px 18px rgba(0,0,0,0.05);
background:white;
transition:.2s;
}

textarea:focus{
transform:translateY(-2px);
box-shadow:0 16px 28px rgba(125,175,255,0.18);
}

textarea::placeholder{
color:#999;
}

/* BUTTONS */

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:14px 18px;
border-radius:20px;
background:white;
font-weight:600;
cursor:pointer;
transition:0.25s;
box-shadow:0 8px 18px rgba(0,0,0,0.05);
}

.btn:hover{
transform:translateY(-3px);
}

.btn.active{
background:linear-gradient(135deg,var(--pink),var(--blue));
color:white;
}

/* SYMBOL BUTTONS */

.symbol-btn{
width:68px;
height:68px;
display:flex;
justify-content:center;
align-items:center;
padding:0;
}

.symbol-btn img{
width:40px;
height:40px;
transition:.2s;
}

/* ORIGINAL ICON COLORS BACK */

.symbol-btn[data-symbol="srdce.svg"] img{
filter:
brightness(0)
saturate(100%)
invert(67%)
sepia(51%)
saturate(1452%)
hue-rotate(292deg);
}

.symbol-btn[data-symbol="hviezda.svg"] img{
filter:
brightness(0)
saturate(100%)
invert(82%)
sepia(44%)
saturate(1175%)
hue-rotate(337deg);
}

.symbol-btn[data-symbol="medved.svg"] img{
filter:
brightness(0)
saturate(100%)
invert(67%)
sepia(17%)
saturate(818%)
hue-rotate(76deg);
}

.symbol-btn[data-symbol="zajac.svg"] img{
filter:
brightness(0)
saturate(100%)
invert(48%)
sepia(81%)
saturate(1071%)
hue-rotate(199deg);
}

/* COLORS */

.colors{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.color{
width:52px;
height:52px;
border-radius:50%;
cursor:pointer;
border:3px solid white;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
transition:.2s;
}

.color:hover{
transform:scale(1.08);
}

.color.active{
outline:4px solid rgba(125,175,255,0.25);
}

/* ORDER */

.order-btn{
width:100%;
border:none;
padding:18px;
border-radius:24px;
font-size:17px;
font-weight:700;
color:white;
background:linear-gradient(135deg,var(--pink),var(--blue));
cursor:pointer;
margin-top:28px;
transition:0.25s;
box-shadow:0 14px 30px rgba(255,124,198,0.28);
}

.order-btn:hover{
transform:translateY(-3px);
}

/* MOBILE */

@media(max-width:768px){

html,
body{
height:100%;
overflow:hidden;
}

.app{
display:flex;
flex-direction:column;
height:100vh;
padding:0;
gap:0;
}

/* TOP */

.left{
position:sticky;
top:0;
height:58vh;
padding:10px;
z-index:10;
}

/* CARD */

.preview-card{
height:100%;
border-radius:0 0 30px 30px;
padding:10px;
gap:10px;
}

/* HEADER */

.logo{
font-size:30px;
}

.logo-sub{
font-size:11px;
line-height:1.4;
}

/* PRODUCT BAR */

.product-btn{
min-width:110px;
padding:10px;
border-radius:18px;
font-size:12px;
gap:4px;
}

.product-preview-icon{
width:48px;
height:48px;
}

/* PREVIEW */

.preview-window{
flex:1;
min-height:0;
padding:10px;
}

.preview-window svg{
max-width:100%;
max-height:100%;
}

/* RIGHT */

.right{
height:42vh;
overflow-y:auto;
border-radius:30px 30px 0 0;
padding:20px;
margin-top:-8px;
}

/* TITLES */

.title{
font-size:28px;
margin-bottom:6px;
}

.subtitle{
font-size:13px;
line-height:1.5;
margin-bottom:18px;
}

/* INPUT */

textarea{
min-height:90px;
font-size:15px;
padding:16px;
}

/* BUTTONS */

.btn{
padding:12px 14px;
font-size:14px;
border-radius:16px;
}

.symbol-btn{
width:58px;
height:58px;
}

.symbol-btn img{
width:34px;
height:34px;
}

.color{
width:44px;
height:44px;
}

/* ORDER */

.order-btn{
padding:16px;
font-size:16px;
border-radius:18px;
margin-top:22px;
}

/* SCROLLBAR */

.right::-webkit-scrollbar{
width:4px;
}

.right::-webkit-scrollbar-thumb{
background:rgba(0,0,0,0.12);
border-radius:20px;
}

}

</style>

</head>

<body>

<div class="app">

<!-- LEFT -->

<div class="left" id="leftPanel">

<div class="preview-card">

<div class="top-info">

<div class="logo">
TVODO
</div>

<div class="logo-sub">
Personalizovaná jemná výšivka pre výnimočné momenty ✨
</div>

</div>

<div class="product-bar">

<button class="product-btn active">
<img src="shirt.svg" class="product-preview-icon">
Tričko
</button>

<button class="product-btn">
<img src="body.svg" class="product-preview-icon">
Body
</button>

<button class="product-btn">
<img src="bib.svg" class="product-preview-icon">
Bryndák
</button>

</div>

<div class="preview-window">

<svg
id="previewSvg"
viewBox="0 0 1000 1000"
preserveAspectRatio="xMidYMid meet">

<image
id="productImage"
href="shirt.svg"
x="120"
y="60"
width="760"
height="860"/>

<rect
id="zoneFrame"
class="zone-frame"
x="420"
y="340"
width="160"
height="160"/>

<image
id="symbolLayer"
href=""
x="470"
y="330"
width="50"
height="50"
display="none"/>

<text
id="embroideryText"
x="500"
y="430"></text>

</svg>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right" id="scrollPanel">

<div class="title">
Navrhnite si svoju výšivku
</div>

<div class="subtitle">
Vytvorte si originálny kúsok presne podľa seba ✨
</div>

<div class="section">

<div class="section-title">
Čo vám máme vyššiť?
</div>

<textarea
id="textInput"
maxlength="34"
placeholder="Sem môžete zadať meno, venovanie alebo vlastný text ✨"></textarea>

</div>

<div class="section">

<div class="section-title">
Vyberte si detail
</div>

<div class="row">

<button class="btn symbol-btn active" data-symbol="">
✕
</button>

<button class="btn symbol-btn" data-symbol="srdce.svg">
<img src="srdce.svg">
</button>

<button class="btn symbol-btn" data-symbol="hviezda.svg">
<img src="hviezda.svg">
</button>

<button class="btn symbol-btn" data-symbol="medved.svg">
<img src="medved.svg">
</button>

<button class="btn symbol-btn" data-symbol="zajac.svg">
<img src="zajac.svg">
</button>

</div>

</div>

<div class="section">

<div class="section-title">
Miesto výšivky
</div>

<div class="row">

<button class="btn position-btn active" data-position="center">
Na stred
</button>

<button class="btn position-btn" data-position="chest">
Na prsia
</button>

</div>

</div>

<div class="section">

<div class="section-title">
Farba trička
</div>

<div class="row">

<button class="btn shirt-color-btn active" data-shirt="white">
Biele
</button>

<button class="btn shirt-color-btn" data-shirt="black">
Čierne
</button>

</div>

</div>

<div class="section">

<div class="section-title">
Veľkosť
</div>

<div class="row">

<button class="btn size-btn active">S</button>
<button class="btn size-btn">M</button>
<button class="btn size-btn">L</button>
<button class="btn size-btn">XL</button>
<button class="btn size-btn">2XL</button>

</div>

</div>

<div class="section">

<div class="section-title">
Štýl písma
</div>

<div class="row">

<button class="btn font-btn active" data-font="Montserrat">
Klasický
</button>

<button class="btn font-btn" data-font="Fredoka">
Hravý
</button>

<button class="btn font-btn" data-font="Dancing Script">
Písaný
</button>

</div>

</div>

<div class="section">

<div class="section-title">
Farba nite
</div>

<div class="colors">

<div class="color active" data-color="#ff7cc6" style="background:#ff7cc6"></div>
<div class="color" data-color="#5c86ff" style="background:#5c86ff"></div>
<div class="color" data-color="#69c27d" style="background:#69c27d"></div>
<div class="color" data-color="#f4c542" style="background:#f4c542"></div>
<div class="color" data-color="black" style="background:black"></div>
<div class="color" data-color="white" style="background:white;border:2px solid #ddd"></div>

</div>

</div>

<button class="order-btn" id="orderButton">
Dokončiť objednávku
</button>

</div>

</div>

<script>

const embroideryText = document.getElementById('embroideryText');
const textInput = document.getElementById('textInput');
const productImage = document.getElementById('productImage');
const symbolLayer = document.getElementById('symbolLayer');

let currentPosition = 'center';
let selectedSymbol = '';
let currentThreadColor = '#ff7cc6';

const positions = {

center:{
x:420,
y:340,
w:160,
h:160
},

chest:{
x:530,
y:320,
w:160,
h:160
}

};

/* RENDER TEXT */

function renderText(){

const zone = positions[currentPosition];

let text = textInput.value.trim();

if(text === ''){
text = 'Vaša výšivka';
}

const centerX = zone.x + zone.w/2;
const centerY = zone.y + zone.h/2;

let fontSize = 42;

let maxLines = selectedSymbol !== '' ? 2 : 3;

let symbolOffset = selectedSymbol !== '' ? 26 : 0;

const words = text.split(' ');

let lines = [];
let currentLine = '';

words.forEach(word=>{

const testLine =
(currentLine + ' ' + word).trim();

if(testLine.length > 10){

if(currentLine !== ''){
lines.push(currentLine);
}

currentLine = word;

}else{

currentLine = testLine;

}

});

if(currentLine !== ''){
lines.push(currentLine);
}

lines = lines.slice(0,maxLines);

embroideryText.innerHTML='';

if(lines.length >= 2){
fontSize = 34;
}

if(lines.length >= 3){
fontSize = 28;
}

embroideryText.style.fontSize =
fontSize + 'px';

lines.forEach((line,index)=>{

const tspan =
document.createElementNS(
'http://www.w3.org/2000/svg',
'tspan'
);

const totalHeight =
(lines.length-1) * 36;

tspan.setAttribute('x',centerX);

tspan.setAttribute(
'y',
centerY
+
symbolOffset
-
(totalHeight/2)
+
(index*36)
);

tspan.textContent = line;

embroideryText.appendChild(tspan);

});

}

/* UPDATE SYMBOL */

function updateVisuals(){

const zone = positions[currentPosition];

const centerX = zone.x + zone.w/2;

if(selectedSymbol !== ''){

symbolLayer.setAttribute(
'href',
selectedSymbol
);

symbolLayer.setAttribute(
'x',
centerX - 24
);

symbolLayer.setAttribute(
'y',
zone.y + 8
);

symbolLayer.style.display='block';

}else{

symbolLayer.style.display='none';

}

}

/* INIT */

renderText();
updateVisuals();

/* TEXT INPUT */

textInput.addEventListener('input',()=>{

renderText();

});

/* FONT */

document.querySelectorAll('.font-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

document.querySelectorAll('.font-btn')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

embroideryText.style.fontFamily =
btn.dataset.font;

renderText();

});

});

/* THREAD COLOR */

document.querySelectorAll('.color').forEach(color=>{

color.addEventListener('click',()=>{

document.querySelectorAll('.color')
.forEach(c=>c.classList.remove('active'));

color.classList.add('active');

currentThreadColor = color.dataset.color;

embroideryText.style.fill =
currentThreadColor;

/* ICON COLOR CHANGES TOO */

const icons = document.querySelectorAll('.symbol-btn img');

icons.forEach(icon=>{

icon.style.filter = '';

});

});

});

/* POSITION */

document.querySelectorAll('.position-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

document.querySelectorAll('.position-btn')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

currentPosition = btn.dataset.position;

renderText();
updateVisuals();

});

});

/* SYMBOL */

document.querySelectorAll('.symbol-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

document.querySelectorAll('.symbol-btn')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

selectedSymbol = btn.dataset.symbol;

renderText();
updateVisuals();

});

});

/* SHIRT COLOR */

document.querySelectorAll('.shirt-color-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

document.querySelectorAll('.shirt-color-btn')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

const color = btn.dataset.shirt;

if(color === 'black'){

productImage.style.filter =
'brightness(0.18) drop-shadow(0 20px 30px rgba(0,0,0,0.18))';

}else{

productImage.style.filter =
'drop-shadow(0 20px 30px rgba(0,0,0,0.08))';

}

});

});

/* SIZE */

document.querySelectorAll('.size-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

document.querySelectorAll('.size-btn')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

});

});

/* HIDE TOP ON SCROLL */

const scrollPanel =
document.getElementById('scrollPanel');

const leftPanel =
document.getElementById('leftPanel');

scrollPanel.addEventListener('scroll',()=>{

if(scrollPanel.scrollTop > 40){

leftPanel.classList.add('compact');

}else{

leftPanel.classList.remove('compact');

}

});

/* ORDER */

document.getElementById('orderButton')
.addEventListener('click',()=>{

alert('Objednávka bude čoskoro napojená ✨');

});

</script>

</body>
</html>
