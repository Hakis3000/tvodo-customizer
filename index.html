<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVODO – Customizer</title>

<style>

body{
    margin:0;
    background:#f3f3f3;
    font-family:Poppins, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* ======== PAPIER ======== */
.canvas{
    width:100%;
    max-width:520px;
    aspect-ratio:3/4;
    background:white;
    border-radius:22px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    position:relative;
    overflow:hidden;
}

/* ======== TRIČKO – presne na strede, celé viditeľné ======== */
.shirt-wrapper{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

.product-image{
    width:100%;
    height:100%;
    object-fit:contain; /* 🔥 nič sa neoreže */
    pointer-events:none;
}

/* ======== RÁMČEK – malé ružové bodky ======== */
.frame-wrapper{
    position:absolute;

    width:26%;          /* jemnejšia veľkosť */
    aspect-ratio:1/1;

    top:38%;            /* presné umiestnenie podľa obrázka */
    left:70%;
    transform:translate(-50%, -50%);

    pointer-events:none;
}

.frame-wrapper svg{
    width:100%;
    height:100%;
}

.frame-wrapper rect{
    fill:transparent;
    stroke:#ff7cc6;
    stroke-width:3;

    /* MALÉ BODKY – jemné, nenápadné */
    stroke-dasharray:0.5 10;
    stroke-linecap:round;

    rx:10;
}

</style>
</head>

<body>

<div class="canvas">

    <!-- TRIČKO -->
    <div class="shirt-wrapper">
        <img class="product-image" src="tricko.svg">
    </div>

    <!-- RÁMČEK -->
    <div class="frame-wrapper">
        <svg viewBox="0 0 100 100">
            <rect x="0" y="0" width="100" height="100"></rect>
        </svg>
    </div>

</div>

</body>
</html>
