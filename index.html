<!DOCTYPE html>
<html lang="sk">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TVODO Customizer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@600;700&family=Fredoka:wght@500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--pink:#ff7cc6;
--blue:#7dafff;

--bg1:#fff7fb;
--bg2:#eef5ff;

--panel:
rgba(255,255,255,0.72);

}

body{

font-family:Poppins,sans-serif;

min-height:100vh;

background:
linear-gradient(
135deg,
var(--bg1),
var(--bg2)
);

overflow-x:hidden;

}

/* BACKGROUND BLOBS */

.bg{

position:fixed;

border-radius:50%;

filter:blur(120px);

opacity:0.22;

z-index:-1;
}

.bg1{

width:500px;
height:500px;

background:var(--pink);

top:-180px;
left:-120px;
}

.bg2{

width:500px;
height:500px;

background:var(--blue);

bottom:-180px;
right:-120px;
}

/* APP */

.app{

width:100%;

min-height:100vh;

display:grid;

grid-template-columns:
minmax(0,1fr)
420px;

}

/* LEFT */

.left{

display:flex;
justify-content:center;
align-items:center;

padding:40px;

min-height:100vh;

}

/* PREVIEW */

.preview{

position:relative;

width:min(90vw,850px);

aspect-ratio:4/5;

display:flex;
justify-content:center;
align-items:center;

}

/* SHIRT */

.shirt{

width:100%;
height:100%;

object-fit:contain;

user-select:none;
pointer-events:none;

filter:
drop-shadow(0 30px 60px rgba(0,0,0,0.16));

}

/* EMBROIDERY */

.embroidery-zone{

position:absolute;

top:31%;

left:50%;

transform:translateX(-50%);

width:34%;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

gap:10px;

}

/* ICON */

.icon{

font-size:34px;

line-height:1;

}

/* TEXT */

.text{

font-family:'Montserrat';

font-size:clamp(18px,2.2vw,42px);

font-weight:700;

line-height:1.1;

text-align:center;

white-space:pre-line;

color:black;

text-shadow:
0 1px 1px rgba(255,255,255,0.5),
0 2px 6px rgba(0,0,0,0.14);

max-width:100%;

word-break:break-word;

}

/* RIGHT PANEL */

.right{

background:
rgba(255,255,255,0.3);

backdrop-filter:blur(18px);

border-left:
1px solid rgba(255,255,255,0.35);

padding:28px;

overflow-y:auto;

}

/* SCROLL */

.right::-webkit-scrollbar{

width:8px;
}

.right::-webkit-scrollbar-thumb{

background:
linear-gradient(
180deg,
var(--pink),
var(--blue)
);

border-radius:20px;
}

/* TITLE */

.title{

font-size:34px;

font-weight:700;

line-height:1.05;

margin-bottom:10px;

background:
linear-gradient(
90deg,
var(--pink),
var(--blue)
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.subtitle{

font-size:14px;

line-height:1.7;

color:#666;

margin-bottom:28px;

}

/* SECTION */

.section{

margin-top:24px;
}

.section-title{

font-size:15px;
font-weight:700;

margin-bottom:12px;
}

/* ROW */

.row{

display:flex;
gap:12px;
flex-wrap:wrap;
}

/* BUTTON */

.btn{

border:none;

padding:14px 18px;

border-radius:18px;

cursor:pointer;

font-size:15px;
font-weight:600;

background:
rgba(255,255,255,0.88);

transition:0.15s;

box-shadow:
0 10px 20px rgba(0,0,0,0.06);

}

.btn:hover{

transform:
translateY(-3px)
scale(1.03);

}

.btn.active{

background:
linear-gradient(
135deg,
var(--pink),
var(--blue)
);

color:white;

}

/* TEXTAREA */

textarea{

width:100%;

border:none;

outline:none;

resize:none;

min-height:110px;

padding:18px;

border-radius:24px;

font-size:16px;

font-family:Poppins,sans-serif;

background:
rgba(255,255,255,0.88);

box-shadow:
0 10px 20px rgba(0,0,0,0.05);

}

textarea:focus{

box-shadow:
0 0 0 4px rgba(125,175,255,0.18);

}

/* COLORS */

.colors{

display:flex;
gap:14px;
flex-wrap:wrap;
}

.color{

width:48px;
height:48px;

border-radius:50%;

cursor:pointer;

border:3px solid white;

transition:0.15s;

box-shadow:
0 8px 18px rgba(0,0,0,0.1);

}

.color:hover{

transform:scale(1.08);
}

.color.active{

outline:4px solid rgba(125,175,255,0.28);

}

/* ORDER BUTTON */

.order-btn{

width:100%;

margin-top:34px;

border:none;

padding:20px;

border-radius:24px;

cursor:pointer;

font-size:18px;
font-weight:700;

color:white;

background:
linear-gradient(
135deg,
var(--pink),
var(--blue)
);

box-shadow:
0 16px 34px rgba(122,168,255,0.3);

transition:0.15s;

}

.order-btn:hover{

transform:
translateY(-4px)
scale(1.01);

}

/* MOBILE */

@media(max-width:1100px){

.app{

grid-template-columns:1fr;

}

.left{

min-height:auto;

padding:
24px
18px
10px;

}

.preview{

width:min(100%,620px);

}

.right{

border-left:none;

border-top:
1px solid rgba(255,255,255,0.4);

padding:22px;

background:
rgba(255,255,255,0.5);

}

.title{

font-size:28px;

}

.embroidery-zone{

top:30%;

width:38%;

}

}

/* SMALL MOBILE */

@media(max-width:600px){

.preview{

width:100%;

}

.embroidery-zone{

width:44%;

top:29%;

}

.text{

font-size:clamp(16px,5vw,28px);

}

.btn{

padding:13px 16px;

font-size:14px;

}

}

</style>

</head>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<div class="app">

<!-- LEFT -->

<div class="left">

<div class="preview">

<img
src="tricko.svg"
class="shirt"
id="shirt"
/>

<div class="embroidery-zone">

<div
class="icon"
id="iconLayer"
>
✨
</div>

<div
class="text"
id="textLayer"
>
TVODO
</div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right">

<div class="title">
Navrhnite si vlastné tričko
</div>

<div class="subtitle">
Prémiová personalizovaná výšivka podľa vašich predstáv.
</div>

<!-- TEXT -->

<div class="section">

<div class="section-title">
Text výšivky
</div>

<textarea
id="textInput"
placeholder="Napíšte meno alebo text..."
maxlength="40"
></textarea>

</div>

<!-- FONT -->

<div class="section">

<div class="section-title">
Štýl textu
</div>

<div class="row">

<button
class="btn active font-btn"
data-font="Montserrat"
>
Moderný
</button>

<button
class="btn font-btn"
data-font="Fredoka"
>
Hravý
</button>

<button
class="btn font-btn"
data-font="Dancing Script"
>
Písaný
</button>

</div>

</div>

<!-- COLOR -->

<div class="section">

<div class="section-title">
Farba nite
</div>

<div class="colors">

<div
class="color active"
data-color="black"
style="background:black;"
></div>

<div
class="color"
data-color="white"
style="
background:white;
border:1px solid #ccc;
"
></div>

<div
class="color"
data-color="#ff7cc6"
style="background:#ff7cc6;"
></div>

<div
class="color"
data-color="#7dafff"
style="background:#7dafff;"
></div>

</div>

</div>

<!-- ICON -->

<div class="section">

<div class="section-title">
Ikonka
</div>

<div class="row">

<button class="btn icon-btn" data-icon="✨">
✨
</button>

<button class="btn icon-btn" data-icon="❤️">
❤️
</button>

<button class="btn icon-btn" data-icon="⭐">
⭐
</button>

<button class="btn icon-btn" data-icon="🧸">
🧸
</button>

<button class="btn icon-btn" data-icon="">
Bez
</button>

</div>

</div>

<button class="order-btn">
Pokračovať k objednávke
</button>

</div>

</div>

<script>

/* ELEMENTS */

const textInput =
document.getElementById("textInput");

const textLayer =
document.getElementById("textLayer");

const iconLayer =
document.getElementById("iconLayer");

/* TEXT */

textInput.addEventListener(
"input",
()=>{

textLayer.innerText =
textInput.value || "TVODO";

}
);

/* FONT */

document
.querySelectorAll(".font-btn")
.forEach(btn=>{

btn.addEventListener(
"click",
()=>{

document
.querySelectorAll(".font-btn")
.forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

textLayer.style.fontFamily =
btn.dataset.font;

}
);

});

/* COLORS */

document
.querySelectorAll(".color")
.forEach(color=>{

color.addEventListener(
"click",
()=>{

document
.querySelectorAll(".color")
.forEach(c=>{
c.classList.remove("active");
});

color.classList.add("active");

textLayer.style.color =
color.dataset.color;

}
);

});

/* ICONS */

document
.querySelectorAll(".icon-btn")
.forEach(btn=>{

btn.addEventListener(
"click",
()=>{

document
.querySelectorAll(".icon-btn")
.forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

iconLayer.innerText =
btn.dataset.icon;

}
);

});

</script>

</body>
</html>
