<!-- ========================================= -->
<!-- TVODO CUSTOMIZER FINAL V4 FIXED -->
<!-- ========================================= -->

<!DOCTYPE html>
<html lang="sk">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>TVODO - Personalizovaná výšivka</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@600;700&family=Fredoka:wght@500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

:root{
--pink:#ff7cc6;
--blue:#7dafff;
--bg1:#fff8fc;
--bg2:#eef5ff;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
overflow-x:hidden;
color:#222;
min-height:100vh;
}

/* BG */

body::before{
content:'';
position:fixed;
width:500px;
height:500px;
border-radius:50%;
background:var(--pink);
filter:blur(140px);
opacity:0.12;
top:-200px;
left:-200px;
z-index:-1;
}

body::after{
content:'';
position:fixed;
width:500px;
height:500px;
border-radius:50%;
background:var(--blue);
filter:blur(140px);
opacity:0.12;
bottom:-200px;
right:-200px;
z-index:-1;
}

/* MAIN */

.app{
display:grid;
grid-template-columns:minmax(0,1fr) 430px;
gap:24px;
padding:20px;
max-width:1800px;
margin:auto;
}

/* LEFT */

.left{
position:sticky;
top:20px;
height:calc(100vh - 40px);
transition:.35s;
}

/* HIDE ON SCROLL */

.left.compact .top-info{
opacity:0;
height:0;
overflow:hidden;
margin:0;
pointer-events:none;
}

.left.compact .product-bar{
opacity:0;
height:0;
overflow:hidden;
margin:0;
padding:0;
pointer-events:none;
}

/* CARD */

.preview-card{
height:100%;
border-radius:34px;
background:rgba(255,255,255,0.56);
backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,0.55);
box-shadow:0 20px 50px rgba(0,0,0,0.08);
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
overflow:hidden;
}

/* HEADER */

.top-info{
transition:.35s;
}

.logo{
font-size:34px;
font-weight:700;
letter-spacing:-1px;
background:linear-gradient(90deg,var(--pink),var(--blue));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
line-height:1;
}

.logo-sub{
font-size:12px;
line-height:1.5;
color:#666;
margin-top:4px;
}

/* PRODUCT BAR */

.product-bar{
display:flex;
gap:8px;
overflow:auto;
padding-bottom:2px;
scrollbar-width:none;
transition:.35s;
}

.product-bar::-webkit-scrollbar{
display:none;
}

.product-btn{
min-width:92px;
border:none;
padding:8px;
border-radius:18px;
background:white;
cursor:pointer;
font-weight:600;
font-size:11px;
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
transition:0.28s;
box-shadow:0 10px 24px rgba(0,0,0,0.06);
}

.product-btn:hover{
transform:translateY(-3px);
}

.product-btn.active{
background:linear-gradient(135deg,var(--pink),var(--blue));
color:white;
}

.product-preview-icon{
width:36px;
height:36px;
object-fit:contain;
}

/* PREVIEW */

.preview-window{
flex:1;
border-radius:30px;
padding:20px;
background:
radial-gradient(circle at top left,rgba(255,255,255,0.85),transparent 40%),
radial-gradient(circle at bottom right,rgba(255,255,255,0.85),transparent 40%),
linear-gradient(135deg,#f4f7ff,#fff0f7);
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

.preview-window svg{
width:100%;
height:auto;
aspect-ratio:1/1;
max-width:760px;
transition:.3s;
}

#productImage{
transition:0.35s;
filter:drop-shadow(0 20px 30px rgba(0,0,0,0.08));
}

.zone-frame{
display:none;
}

/* TEXT */

#embroideryText{
font-size:42px;
font-family:Montserrat;
font-weight:700;
fill:#ff7cc6;
text-anchor:middle;
dominant-baseline:middle;
paint-order:stroke;
stroke:rgba(255,255,255,0.35);
stroke-width:1.4;
transition:.2s;
}

/* SYMBOL */

#symbolLayer{
transition:0.25s;
}

/* RIGHT */

.right{
background:rgba(255,255,255,0.56);
backdrop-filter:blur(22px);
border-radius:34px;
padding:24px;
box-shadow:0 20px 50px rgba(0,0,0,0.06);
border:1px solid rgba(255,255,255,0.5);
overflow-y:auto;
}

/* TITLES */

.title{
font-size:38px;
font-weight:700;
line-height:1.08;
margin-bottom:10px;
background:linear-gradient(90deg,var(--pink),var(--blue));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:15px;
line-height:1.8;
color:#666;
margin-bottom:24px;
}

/* SECTION */

.section{
margin-top:24px;
}

.section-title{
font-size:16px;
font-weight:700;
margin-bottom:10px;
}

/* INPUT */

textarea{
width:100%;
min-height:120px;
border:none;
resize:none;
border-radius:24px;
padding:18px;
font-family:Poppins;
font-size:15px;
outline:none;
box-shadow:0 8px 18px rgba(0,0,0,0.05);
background:white;
transition:.2s;
}

textarea:focus{
transform:translateY(-2px);
box-shadow:0 16px 28px rgba(125,175,255,0.18);
}

textarea::placeholder{
color:#999;
}

/* BUTTONS */

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:14px 18px;
border-radius:20px;
background:white;
font-weight:600;
cursor:pointer;
transition:0.25s;
box-shadow:0 8px 18px rgba(0,0,0,0.05);
}

.btn:hover{
transform:translateY(-3px);
}

.btn.active{
background:linear-gradient(135deg,var(--pink),var(--blue));
color:white;
}

/* SYMBOL BUTTONS */

.symbol-btn{
width:68px;
height:68px;
display:flex;
justify-content:center;
align-items:center;
padding:0;
}

.symbol-btn img{
width:40px;
height:40px;
transition:.2s;
}

/* COLORS */

.colors{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.color{
width:52px;
height:52px;
border-radius:50%;
cursor:pointer;
border:3px solid white;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
transition:.2s;
}

.color:hover{
transform:scale(1.08);
}

.color.active{
outline:4px solid rgba(125,175,255,0.25);
}

/* ORDER */

.order-btn{
width:100%;
border:none;
padding:18px;
border-radius:24px;
font-size:17px;
font-weight:700;
color:white;
background:linear-gradient(135deg,var(--pink),var(--blue));
cursor:pointer;
margin-top:28px;
transition:0.25s;
box-shadow:0 14px 30px rgba(255,124,198,0.28);
}

/* MOBILE */

@media(max-width:768px){

html,
body{
height:100%;
overflow:hidden;
}

.app{
display:flex;
flex-direction:column;
height:100vh;
padding:0;
gap:0;
}

/* TOP */

.left{
position:fixed;
top:0;
left:0;
width:100%;
height:50vh;
padding:10px;
z-index:20;
transition:.35s;
}

/* CARD */

.preview-card{
height:100%;
border-radius:0 0 26px 26px;
padding:8px;
gap:8px;
}

/* LOGO */

.logo{
font-size:24px;
}

.logo-sub{
font-size:10px;
line-height:1.3;
}

/* PRODUCT BAR */

.product-btn{
min-width:82px;
padding:6px;
border-radius:14px;
font-size:10px;
gap:2px;
}

.product-preview-icon{
width:28px;
height:28px;
}

/* PREVIEW */

.preview-window{
flex:1;
min-height:0;
padding:0;
border-radius:24px;
}

.preview-window svg{
max-width:100%;
max-height:100%;
transform:scale(1.05);
}

/* RIGHT */

.right{
position:fixed;
bottom:0;
left:0;
width:100%;
height:50vh;
overflow-y:auto;
border-radius:28px 28px 0 0;
padding:18px;
padding-bottom:120px;
z-index:30;
background:rgba(255,255,255,0.92);
backdrop-filter:blur(20px);
}

/* TITLES */

.title{
font-size:24px;
margin-bottom:4px;
}

.subtitle{
font-size:12px;
line-height:1.4;
margin-bottom:14px;
}

/* INPUT */

textarea{
min-height:84px;
font-size:15px;
padding:15px;
border-radius:20px;
}

/* BUTTONS */

.btn{
padding:11px 13px;
font-size:13px;
border-radius:14px;
}

.symbol-btn{
width:54px;
height:54px;
}

.symbol-btn img{
width:30px;
height:30px;
}

/* COLORS */

.color{
width:40px;
height:40px;
}

/* ORDER */

.order-btn{
padding:15px;
font-size:15px;
border-radius:18px;
margin-top:20px;
}

}

/* SCROLLBAR */

.right::-webkit-scrollbar{
width:4px;
}

.right::-webkit-scrollbar-thumb{
background:rgba(0,0,0,0.12);
border-radius:20px;
}

</style>

</head>

<body>

<div class="app">

<!-- LEFT -->

<div class="left" id="leftPanel">

<div class="preview-card">

<div class="top-info">

<div class="logo">
TVODO
</div>

<div class="logo-sub">
Personalizovaná jemná výšivka ✨
</div>

</div>

<div class="product-bar">

<button class="product-btn active">
<img src="shirt.svg" class="product-preview-icon">
Tričko
</button>

<button class="product-btn">
<img src="body.svg" class="product-preview-icon">
Body
</button>

<button class="product-btn">
<img src="bib.svg" class="product-preview-icon">
Bryndák
</button>

</div>

<div class="preview-window">

<svg
id="previewSvg"
viewBox="0 0 1000 1000"
preserveAspectRatio="xMidYMid meet">

<image
id="productImage"
href="shirt.svg"
x="120"
y="60"
width="760"
height="860"/>

<image
id="symbolLayer"
href=""
x="470"
y="330"
width="50"
height="50"
display="none"/>

<text
id="embroideryText"
x="500"
y="430"></text>

</svg>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right" id="scrollPanel">

<div class="title">
Navrhnite si svoju výšivku
</div>

<div class="subtitle">
Vytvorte si originálny kúsok presne podľa seba ✨
</div>

<div class="section">

<div class="section-title">
Čo vám máme vyššiť?
</div>

<textarea
id="textInput"
maxlength="34"
placeholder="Sem môžete zadať meno, venovanie alebo vlastný text ✨"></textarea>

</div>

</div>

</div>

<script>

const embroideryText = document.getElementById('embroideryText');
const textInput = document.getElementById('textInput');
const symbolLayer = document.getElementById('symbolLayer');

let currentPosition = 'center';
let selectedSymbol = '';
let currentThreadColor = '#ff7cc6';

const positions = {

center:{
x:420,
y:340,
w:160,
h:160
},

chest:{
x:530,
y:320,
w:160,
h:160
}

};

/* TEXT */

function renderText(){

const zone = positions[currentPosition];

let text = textInput.value.trim();

if(text === ''){
text = 'Vaša výšivka';
}

const centerX = zone.x + zone.w/2;
const centerY = zone.y + zone.h/2;

embroideryText.innerHTML='';

const tspan =
document.createElementNS(
'http://www.w3.org/2000/svg',
'tspan'
);

tspan.setAttribute('x',centerX);

tspan.setAttribute(
'y',
selectedSymbol !== '' ? centerY + 26 : centerY
);

tspan.textContent = text;

embroideryText.appendChild(tspan);

}

/* SYMBOL */

function updateVisuals(){

const zone = positions[currentPosition];

const centerX = zone.x + zone.w/2;

if(selectedSymbol !== ''){

symbolLayer.setAttribute(
'href',
selectedSymbol
);

symbolLayer.setAttribute(
'x',
centerX - 24
);

symbolLayer.setAttribute(
'y',
zone.y + 8
);

symbolLayer.style.display='block';

let symbolFilter = '';

switch(currentThreadColor){

case '#ff7cc6':

symbolFilter =
'brightness(0) saturate(100%) invert(67%) sepia(51%) saturate(1452%) hue-rotate(292deg)';
break;

case '#5c86ff':

symbolFilter =
'brightness(0) saturate(100%) invert(48%) sepia(81%) saturate(1071%) hue-rotate(199deg)';
break;

case '#69c27d':

symbolFilter =
'brightness(0) saturate(100%) invert(67%) sepia(17%) saturate(818%) hue-rotate(76deg)';
break;

case '#f4c542':

symbolFilter =
'brightness(0) saturate(100%) invert(82%) sepia(44%) saturate(1175%) hue-rotate(337deg)';
break;

case 'black':

symbolFilter =
'brightness(0)';
break;

case 'white':

symbolFilter =
'brightness(0) invert(1)';
break;

}

symbolLayer.setAttribute(
'style',
'filter:' + symbolFilter
);

}else{

symbolLayer.style.display='none';

}

}

renderText();
updateVisuals();

/* TEXT */

textInput.addEventListener('input',()=>{

renderText();

});

/* SCROLL */

const scrollPanel =
document.getElementById('scrollPanel');

const leftPanel =
document.getElementById('leftPanel');

scrollPanel.addEventListener('scroll',()=>{

if(scrollPanel.scrollTop > 30){

leftPanel.classList.add('compact');

}else{

leftPanel.classList.remove('compact');

}

});

</script>

</body>
</html>
