<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVODO – Customizer</title>

<style>

body{
    margin:0;
    background:#f3f3f3;
    font-family:Poppins, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* ======== PAPIER ======== */
.shirt-wrapper{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    transform-origin:center center;
    transition:transform 0.2s ease-out;

    left:55%;                 /* posun doprava */
    transform:translateX(-50%);
}


/* ======== TRIČKO (zoomuje sa) ======== */
.frame-wrapper{
    position:absolute;

    width:28%;               /* zmenšené o 30% */
    aspect-ratio:1/1;

    top:40%;                 /* posunuté nižšie */
    left:68%;                /* ostáva doprava */
    transform:translate(-50%, -50%);

    pointer-events:none;
}


.product-image{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

/* ======== RÁMČEK (ram.svg → prerobený na ružový bodkovaný) ======== */
.frame-wrapper{
    position:absolute;

    /* zväčšenie o 100 % (2×) */
    width:40%;              /* pôvodne 20% = 1/5 trička → teraz 40% */
    aspect-ratio:1/1;

    /* pozícia podľa tvojej fotky */
    top:28%;                /* hore */
    left:68%;               /* doprava */
    transform:translate(-50%, -50%);

    pointer-events:none;
}

/* prerobíme ram.svg na ružový bodkovaný rámček */
.frame-wrapper svg{
    width:100%;
    height:100%;
}

.frame-wrapper rect{
    fill:transparent; /* priesvitný stred */
    stroke:#ff7cc6;   /* ružová */
    stroke-width:6;
    stroke-dasharray:10 10; /* bodkovaná čiara */
    rx:18; /* zaoblené rohy */
}

</style>
</head>

<body>

<div class="canvas">

    <!-- TRIČKO -->
    <div class="shirt-wrapper" id="shirtWrapper">
        <img id="productImage" class="product-image" src="tricko.svg">
    </div>

    <!-- TVOJ RÁMČEK (SVG vložený priamo sem) -->
    <div class="frame-wrapper">
        <svg viewBox="0 0 100 100">
            <rect x="0" y="0" width="100" height="100"></rect>
        </svg>
    </div>

</div>

<script>

/* ======== ZOOM IBA NA TRIČKO ======== */

let zoom = 1;
const shirt = document.getElementById("shirtWrapper");

document.addEventListener("keydown", e=>{
    if(e.key === "+"){
        zoom = Math.min(zoom + 0.1, 3);
        shirt.style.transform = `scale(${zoom})`;
    }
    if(e.key === "-"){
        zoom = Math.max(zoom - 0.1, 0.5);
        shirt.style.transform = `scale(${zoom})`;
    }
    if(e.key === "0"){
        zoom = 1;
        shirt.style.transform = `scale(1)`;
    }
});

</script>

</body>
</html>
