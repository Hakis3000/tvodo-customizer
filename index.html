<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TVODO - Customizer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@600;700&family=Fredoka:wght@500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--pink:#ff7cc6;
--blue:#7dafff;
--bg1:#fff8fc;
--bg2:#eef5ff;
}

body{
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:#222;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
width:500px;
height:500px;
border-radius:50%;
background:var(--pink);
filter:blur(140px);
opacity:0.12;
top:-200px;
left:-200px;
z-index:-1;
}

body::after{
content:'';
position:fixed;
width:500px;
height:500px;
border-radius:50%;
background:var(--blue);
filter:blur(140px);
opacity:0.12;
bottom:-200px;
right:-200px;
z-index:-1;
}

.app{
display:grid;
grid-template-columns:minmax(0,1fr) 430px;
gap:24px;
padding:20px;
max-width:1800px;
margin:auto;
align-items:start;
}

.left{
position:sticky;
top:20px;
height:calc(100vh - 40px);
}

.preview-card{
height:100%;
border-radius:34px;
background:rgba(255,255,255,0.55);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.5);
box-shadow:0 20px 50px rgba(0,0,0,0.08);
padding:18px;
display:flex;
flex-direction:column;
gap:16px;
}

.product-bar{
display:flex;
gap:10px;
overflow:auto;
padding-bottom:4px;
}

.product-btn{
min-width:max-content;
border:none;
padding:12px 18px;
border-radius:18px;
background:white;
font-weight:600;
cursor:pointer;
box-shadow:0 8px 18px rgba(0,0,0,0.05);
transition:0.25s;
}

.product-btn.active{
background:linear-gradient(135deg,var(--pink),var(--blue));
color:white;
}

.preview-window{
flex:1;
border-radius:28px;
background:white;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 14px 40px rgba(0,0,0,0.08);
padding:20px;
}

.preview-window svg{
width:100%;
height:auto;
aspect-ratio:1/1;
max-width:760px;
}

#embroideryText{
font-size:42px;
font-family:Montserrat;
font-weight:700;
fill:#ff7cc6;
text-anchor:middle;
dominant-baseline:middle;
}

#embroideryIcon{
filter:drop-shadow(0 4px 10px rgba(0,0,0,0.15));
}

.zone-frame{
fill:none;
stroke:rgba(255,124,198,0.22);
stroke-width:2;
stroke-dasharray:8 8;
rx:20;
}

.right{
background:rgba(255,255,255,0.55);
backdrop-filter:blur(20px);
border-radius:34px;
padding:24px;
box-shadow:0 20px 50px rgba(0,0,0,0.06);
border:1px solid rgba(255,255,255,0.5);
}

.title{
font-size:42px;
font-weight:700;
line-height:1.05;
margin-bottom:10px;
background:linear-gradient(90deg,var(--pink),var(--blue));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
color:#666;
line-height:1.7;
margin-bottom:22px;
}

.info-box{
padding:18px;
background:rgba(255,255,255,0.55);
border-radius:22px;
line-height:1.9;
font-size:14px;
color:#666;
margin-bottom:22px;
}

.section{
margin-top:24px;
}

.section-title{
font-size:16px;
font-weight:700;
margin-bottom:12px;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:13px 18px;
border-radius:18px;
background:white;
font-weight:600;
cursor:pointer;
transition:0.2s;
box-shadow:0 8px 18px rgba(0,0,0,0.05);
}

.btn.active{
background:linear-gradient(135deg,var(--pink),var(--blue));
color:white;
}

textarea{
width:100%;
min-height:120px;
border:none;
resize:none;
border-radius:22px;
padding:18px;
font-family:Poppins;
font-size:15px;
box-shadow:0 8px 18px rgba(0,0,0,0.05);
outline:none;
}

.colors{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.color{
width:48px;
height:48px;
border-radius:50%;
cursor:pointer;
border:3px solid white;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
transition:0.2s;
}

.color.active{
outline:4px solid rgba(125,175,255,0.25);
}

.icon-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.icon-btn{
height:90px;
border:none;
border-radius:22px;
background:white;
cursor:pointer;
font-size:28px;
box-shadow:0 8px 18px rgba(0,0,0,0.05);
transition:0.2s;
}

.icon-btn.active{
background:linear-gradient(135deg,var(--pink),var(--blue));
color:white;
}

.order-bar{
margin-top:24px;
}

.order-btn{
width:100%;
border:none;
padding:18px;
border-radius:20px;
font-size:17px;
font-weight:700;
color:white;
background:linear-gradient(135deg,var(--pink),var(--blue));
cursor:pointer;
box-shadow:0 14px 30px rgba(122,168,255,0.3);
}

@media(max-width:1200px){

.app{
grid-template-columns:1fr;
}

.left{
position:relative;
height:auto;
}

.preview-window{
height:560px;
}

}

@media(max-width:700px){

.app{
padding:10px;
gap:14px;
}

.preview-window{
height:480px;
}

.title{
font-size:32px;
}

.right{
padding:18px;
}

}

</style>
</head>

<body>

<div class="app">

<div class="left">

<div class="preview-card">

<div class="product-bar">

<button class="product-btn active" data-product="shirt">
👕 Tričko
</button>

<button class="product-btn" data-product="body">
🍼 Body
</button>

<button class="product-btn" data-product="bib">
🧸 Bryndák
</button>

</div>

<div class="preview-window">

<svg
id="previewSvg"
viewBox="0 0 1000 1000"
preserveAspectRatio="xMidYMid meet">

<image
id="productImage"
href="shirt.svg"
x="120"
y="60"
width="760"
height="860"
/>

<rect
id="zoneFrame"
class="zone-frame"
x="410"
y="260"
width="180"
height="180"
/>

<image
id="embroideryIcon"
href=""
x="470"
y="250"
width="60"
height="60"
display="none"
/>

<text
id="embroideryText"
x="500"
y="340">

<tspan x="500" dy="0">
Sem môžete
</tspan>

<tspan x="500" dy="48">
pridať text
</tspan>

</text>

</svg>

</div>

</div>

</div>

<div class="right">

<div class="title">
Vytvor si svoju výšivku
</div>

<div class="subtitle">
Navrhnite si vlastný vyšívaný produkt presne podľa seba.
</div>

<div class="info-box">
🪡 Každý produkt vyrábame individuálne na objednávku.<br><br>
✨ Náhľad slúži ako vizualizácia výšivky.<br><br>
💌 Ak chcete väčšiu výšivku alebo vlastný obrázok, napíšte nám správu.
</div>

<div class="section">

<div class="section-title">
Text výšivky
</div>

<textarea
id="textInput"
maxlength="40"
placeholder="Napíšte vlastný text..."></textarea>

</div>

<div class="section">

<div class="section-title">
Štýl výšivky
</div>

<div class="row">

<button
class="btn font-btn active"
data-font="Montserrat"
style="font-family:Montserrat">

Mia ✨

</button>

<button
class="btn font-btn"
data-font="Fredoka"
style="font-family:Fredoka">

Mia ✨

</button>

<button
class="btn font-btn"
data-font="Dancing Script"
style="font-family:'Dancing Script'">

Mia ✨

</button>

</div>

</div>

<div class="section">

<div class="section-title">
Farba nite
</div>

<div class="colors">

<div
class="color active"
data-color="#ff7cc6"
style="background:#ff7cc6"></div>

<div
class="color"
data-color="#5c86ff"
style="background:#5c86ff"></div>

<div
class="color"
data-color="#69c27d"
style="background:#69c27d"></div>

<div
class="color"
data-color="#f4c542"
style="background:#f4c542"></div>

<div
class="color"
data-color="black"
style="background:black"></div>

</div>

</div>

<div class="section">

<div class="section-title">
Ikonka
</div>

<div class="icon-grid">

<button
class="icon-btn active"
data-icon="">
✕
</button>

<button
class="icon-btn"
data-icon="hviezda.png">
⭐
</button>

<button
class="icon-btn"
data-icon="srdce.png">
❤️
</button>

<button
class="icon-btn"
data-icon="medved.png">
🧸
</button>

<button
class="icon-btn"
data-icon="zajko.png">
🐰
</button>

</div>

</div>

<div class="order-bar">

<button
class="order-btn">

🛍️ Pokračovať k objednávke

</button>

</div>

</div>

</div>

<script>

const embroideryText = document.getElementById('embroideryText');
const textInput = document.getElementById('textInput');
const embroideryIcon = document.getElementById('embroideryIcon');
const zoneFrame = document.getElementById('zoneFrame');
const productImage = document.getElementById('productImage');

const products = {

shirt:{
image:'shirt.svg',
zone:{x:410,y:260,w:180,h:180},
text:{x:500,y:350}
},

body:{
image:'body.svg',
zone:{x:420,y:310,w:160,h:160},
text:{x:500,y:390}
},

bib:{
image:'bib.svg',
zone:{x:410,y:290,w:180,h:180},
text:{x:500,y:390}
}

};

function updateText(){

let text = textInput.value.trim();

if(text === ''){
text = 'Sem môžete\npridať text';
}

embroideryText.innerHTML='';

const lines = text.split(/\n| /);

lines.forEach((line,index)=>{

const tspan = document.createElementNS(
'http://www.w3.org/2000/svg',
'tspan'
);

tspan.setAttribute(
'x',
embroideryText.getAttribute('x')
);

tspan.setAttribute(
'dy',
index===0 ? 0 : 48
);

tspan.textContent = line;

embroideryText.appendChild(tspan);

});

}

textInput.addEventListener(
'input',
updateText
);

updateText();

document.querySelectorAll('.font-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

document
.querySelectorAll('.font-btn')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

embroideryText.style.fontFamily = btn.dataset.font;

});

});

document.querySelectorAll('.color').forEach(color=>{

color.addEventListener('click',()=>{

document
.querySelectorAll('.color')
.forEach(c=>c.classList.remove('active'));

color.classList.add('active');

embroideryText.style.fill = color.dataset.color;

});

});

document.querySelectorAll('.icon-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

document
.querySelectorAll('.icon-btn')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

const icon = btn.dataset.icon;

if(icon === ''){

embroideryIcon.style.display='none';

}else{

embroideryIcon.setAttribute('href',icon);

embroideryIcon.style.display='block';

}

});

});

document.querySelectorAll('.product-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

document
.querySelectorAll('.product-btn')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

const product = products[btn.dataset.product];

productImage.setAttribute(
'href',
product.image
);

zoneFrame.setAttribute(
'x',
product.zone.x
);

zoneFrame.setAttribute(
'y',
product.zone.y
);

zoneFrame.setAttribute(
'width',
product.zone.w
);

zoneFrame.setAttribute(
'height',
product.zone.h
);

embroideryText.setAttribute(
'x',
product.text.x
);

embroideryText.setAttribute(
'y',
product.text.y
);

embroideryIcon.setAttribute(
'x',
product.text.x - 30
);

embroideryIcon.setAttribute(
'y',
product.text.y - 90
);

updateText();

});

});

</script>

</body>
</html>
