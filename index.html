<!DOCTYPE html>
<html lang="sk">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TVODO Customizer PRO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@600;700&family=Fredoka:wght@500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--pink:#ff7cc6;
--blue:#7dafff;

--bg1:#fff7fb;
--bg2:#eef5ff;

}

body{

font-family:Poppins,sans-serif;

min-height:100vh;

background:
linear-gradient(
135deg,
var(--bg1),
var(--bg2)
);

display:flex;
justify-content:center;
align-items:center;

padding:12px;

overflow:hidden;

position:relative;
}

/* BLOBS */

.bg1,
.bg2{

position:absolute;

border-radius:50%;

filter:blur(140px);

opacity:0.2;

animation:blobMove 16s ease-in-out infinite;
}

.bg1{

width:520px;
height:520px;

background:var(--pink);

top:-220px;
left:-140px;
}

.bg2{

width:520px;
height:520px;

background:var(--blue);

bottom:-220px;
right:-140px;

animation-delay:4s;
}

@keyframes blobMove{

0%{
transform:translate(0px,0px);
}

50%{
transform:translate(35px,-20px);
}

100%{
transform:translate(0px,0px);
}

}

/* APP */

.app{

width:100%;
max-width:1850px;

height:96vh;

display:flex;

overflow:hidden;

border-radius:42px;

background:
rgba(255,255,255,0.56);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,255,255,0.45);

box-shadow:
0 25px 70px rgba(0,0,0,0.1);

position:relative;

z-index:5;
}

/* LEFT */

.left{

flex:1.6;

display:flex;
justify-content:center;
align-items:center;

padding:12px;

position:relative;
overflow:hidden;
}

/* SHIMMER */

.shimmer{

position:absolute;

width:260px;
height:260px;

background:
linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.28),
transparent
);

transform:rotate(25deg);

animation:shimmer 5s linear infinite;

pointer-events:none;
}

@keyframes shimmer{

0%{
left:-250px;
top:-120px;
}

100%{
left:1600px;
top:900px;
}

}

/* PREVIEW */

.preview{

width:min(100vw,1450px);

aspect-ratio:1/1;

display:flex;
justify-content:center;
align-items:center;

position:relative;

animation:floating 6s ease-in-out infinite;
}

@keyframes floating{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0px);
}

}

/* CANVAS */

#shirtCanvas{

width:100% !important;
height:auto !important;

max-width:1450px;

filter:
drop-shadow(0 25px 50px rgba(0,0,0,0.18));

border-radius:20px;
}

/* RIGHT */

.right{

width:440px;

overflow-y:auto;

padding:26px;

background:
rgba(255,255,255,0.12);

border-left:
1px solid rgba(255,255,255,0.22);
}

/* SCROLL */

.right::-webkit-scrollbar{

width:8px;
}

.right::-webkit-scrollbar-thumb{

background:
linear-gradient(
180deg,
var(--pink),
var(--blue)
);

border-radius:20px;
}

/* TITLE */

.title{

font-size:36px;
font-weight:700;

line-height:1.02;

margin-bottom:10px;

background:
linear-gradient(
90deg,
var(--pink),
var(--blue)
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{

font-size:14px;

line-height:1.6;

color:#5f5f5f;

margin-bottom:26px;
}

/* SECTION */

.section{

margin-top:24px;
}

.section-title{

font-size:15px;
font-weight:700;

margin-bottom:12px;
}

/* ROW */

.row{

display:flex;
gap:12px;
flex-wrap:wrap;
}

/* BUTTON */

.btn{

border:none;

padding:14px 18px;

border-radius:18px;

cursor:pointer;

font-weight:600;

font-size:15px;

background:
rgba(255,255,255,0.84);

box-shadow:
0 8px 18px rgba(0,0,0,0.07);

transition:0.12s;
}

.btn:hover{

transform:
translateY(-3px)
scale(1.03);
}

.btn:active{

transform:scale(0.84);
}

.active{

background:
linear-gradient(
135deg,
var(--pink),
var(--blue)
);

color:white;

box-shadow:
0 12px 24px rgba(122,168,255,0.28);

animation:buttonPulse 0.22s ease;
}

@keyframes buttonPulse{

0%{
transform:scale(0.88);
}

60%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

/* TEXTAREA */

textarea{

width:100%;

padding:18px;

border:none;

border-radius:24px;

background:
rgba(255,255,255,0.84);

font-size:16px;

outline:none;

resize:none;

min-height:90px;

font-family:Poppins,sans-serif;

box-shadow:
0 8px 18px rgba(0,0,0,0.05);
}

textarea:focus{

box-shadow:
0 0 0 4px rgba(122,168,255,0.18);
}

/* HELP */

.help{

margin-top:10px;

font-size:13px;

line-height:1.6;

color:#666;
}

/* COLORS */

.colors{

display:flex;
gap:14px;
flex-wrap:wrap;
}

.color{

width:46px;
height:46px;

border-radius:50%;

cursor:pointer;

border:3px solid white;

transition:0.12s;

box-shadow:
0 8px 16px rgba(0,0,0,0.1);
}

.color:hover{

transform:scale(1.12);
}

.color:active{

transform:scale(0.84);
}

.active-color{

outline:4px solid rgba(122,168,255,0.28);

transform:scale(1.12);
}

/* ICONS */

.icons{

display:flex;
gap:14px;
flex-wrap:wrap;
}

.icon-btn{

width:70px;
height:70px;

border:none;

border-radius:22px;

cursor:pointer;

background:
rgba(255,255,255,0.84);

display:flex;
justify-content:center;
align-items:center;

box-shadow:
0 8px 18px rgba(0,0,0,0.07);

transition:0.12s;
}

.icon-btn:hover{

transform:
translateY(-4px)
scale(1.04);
}

.icon-btn:active{

transform:scale(0.84);
}

.icon-btn.active{

background:
linear-gradient(
135deg,
var(--pink),
var(--blue)
);

box-shadow:
0 12px 24px rgba(122,168,255,0.28);
}

.icon-btn img{

width:38px;
height:38px;

object-fit:contain;
}

.remove-icon{

font-size:30px;
font-weight:700;
color:#666;
}

/* INFO */

.info{

margin-top:24px;

padding:18px;

border-radius:24px;

background:
rgba(255,255,255,0.5);

font-size:14px;

line-height:1.7;

color:#5e5e5e;
}

/* ORDER */

.order-btn{

width:100%;

padding:20px;

border:none;

border-radius:26px;

cursor:pointer;

font-size:18px;
font-weight:700;

margin-top:28px;

color:white;

background:
linear-gradient(
135deg,
var(--pink),
var(--blue)
);

box-shadow:
0 14px 30px rgba(122,168,255,0.28);

transition:0.12s;

position:relative;

overflow:hidden;
}

.order-btn::before{

content:"";

position:absolute;

top:0;
left:-120px;

width:90px;
height:100%;

background:
rgba(255,255,255,0.22);

transform:skewX(-25deg);

transition:0.45s;
}

.order-btn:hover::before{

left:120%;
}

.order-btn:hover{

transform:
translateY(-4px)
scale(1.01);
}

.order-btn:active{

transform:scale(0.9);
}

/* MOBILE */

@media(max-width:1100px){

body{

overflow:auto;

padding:0;
}

.app{

flex-direction:column;

height:auto;

border-radius:0;
}

.left{

position:sticky;

top:0;

z-index:20;

background:
linear-gradient(
to bottom,
rgba(255,255,255,0.96),
rgba(255,255,255,0.84)
);

backdrop-filter:blur(14px);

padding:10px;

border-bottom:
1px solid rgba(255,255,255,0.45);
}

.preview{

width:min(100vw,760px);
}

.right{

width:100%;

padding:18px;
}

.title{

font-size:28px;
}

}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="app">

<!-- LEFT -->

<div class="left">

<div class="shimmer"></div>

<div class="preview">

<canvas id="shirtCanvas"></canvas>

</div>

</div>

<!-- RIGHT -->

<div class="right">

<div class="title">
Navrhnite si vlastné tričko
</div>

<div class="subtitle">
Vytvorte si vlastnú výšivku jednoducho podľa seba.
</div>

<!-- SHIRT -->

<div class="section">

<div class="section-title">
Farba trička
</div>

<div class="row">

<button
class="btn shirt-btn active"
onclick="setShirt('white', this)"
>
Biele
</button>

<button
class="btn shirt-btn"
onclick="setShirt('black', this)"
>
Čierne
</button>

</div>

</div>

<!-- SIZE -->

<div class="section">

<div class="section-title">
Veľkosť
</div>

<div class="row">

<button class="btn size-btn">S</button>
<button class="btn size-btn active">M</button>
<button class="btn size-btn">L</button>
<button class="btn size-btn">XL</button>
<button class="btn size-btn">2XL</button>

</div>

</div>

<!-- TEXT -->

<div class="section">

<div class="section-title">
Text výšivky
</div>

<textarea
id="textInput"
maxlength="30"
placeholder="Napíšte meno alebo text"
oninput="updateText()"
></textarea>

<div class="help">
Pre nový riadok použite ENTER.
</div>

</div>

<!-- FONT -->

<div class="section">

<div class="section-title">
Štýl textu
</div>

<div class="row">

<button
class="btn font-btn active"
onclick="setFont('Montserrat', this)"
>
Moderný
</button>

<button
class="btn font-btn"
onclick="setFont('Fredoka', this)"
>
Hravý
</button>

<button
class="btn font-btn"
onclick="setFont('Dancing Script', this)"
>
Písaný
</button>

</div>

</div>

<!-- THREAD -->

<div class="section">

<div class="section-title">
Farba nite
</div>

<div class="colors">

<div class="color active-color"
style="background:black;"
onclick="setThreadColor('black', this)">
</div>

<div class="color"
style="background:white;border:1px solid #ccc;"
onclick="setThreadColor('white', this)">
</div>

<div class="color"
style="background:#ff78b8;"
onclick="setThreadColor('#ff78b8', this)">
</div>

<div class="color"
style="background:#7aa8ff;"
onclick="setThreadColor('#7aa8ff', this)">
</div>

</div>

</div>

<!-- ICONS -->

<div class="section">

<div class="section-title">
Ikonka
</div>

<div class="icons">

<button class="icon-btn active" onclick="removeIcon(this)">
<div class="remove-icon">✕</div>
</button>

<button class="icon-btn" onclick="setIcon('srdce.png', this)">
<img src="srdce.png">
</button>

<button class="icon-btn" onclick="setIcon('medved.png', this)">
<img src="medved.png">
</button>

<button class="icon-btn" onclick="setIcon('hviezda.png', this)">
<img src="hviezda.png">
</button>

<button class="icon-btn" onclick="setIcon('zajko.png', this)">
<img src="zajko.png">
</button>

</div>

</div>

<div class="info">
Každé tričko vyrábame individuálne podľa zvoleného návrhu.
</div>

<button class="order-btn">
Pokračovať k objednávke
</button>

</div>

</div>

<script>

const canvas = new fabric.Canvas('shirtCanvas',{

selection:false

});

canvas.setWidth(1000);
canvas.setHeight(1000);

let shirtImage;
let currentIcon = null;

/* TEXT */

const embroideryText = new fabric.Textbox('',{

left:450,
top:205,

width:260,

fontSize:42,

fontFamily:'Montserrat',

fill:'black',

fontWeight:'700',

textAlign:'center',

editable:false,

selectable:false,

splitByGrapheme:true

});

canvas.add(embroideryText);

/* LOAD SHIRT */

function loadShirt(src){

fabric.Image.fromURL(src,function(img){

if(shirtImage){

canvas.remove(shirtImage);

}

shirtImage = img;

img.set({

left:0,
top:0,

selectable:false,
evented:false

});

img.scaleToWidth(1000);

canvas.add(img);

canvas.sendToBack(img);

canvas.renderAll();

});

}

loadShirt('biele tricko.png');

/* UPDATE TEXT */

function updateText(){

const input =
document.getElementById('textInput').value;

embroideryText.text =
input;

const totalChars =
input.replace(/\n/g,'').length;

let size = 48;

if(totalChars > 4) size = 42;
if(totalChars > 8) size = 34;
if(totalChars > 12) size = 28;
if(totalChars > 16) size = 22;
if(totalChars > 22) size = 18;

embroideryText.set({

fontSize:size

});

if(currentIcon){

embroideryText.set({

top:225

});

}else{

embroideryText.set({

top:205

});

}

canvas.renderAll();

}

/* FONT */

function setFont(font, btn){

document.querySelectorAll('.font-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

embroideryText.set({

fontFamily:font

});

canvas.renderAll();

}

/* THREAD */

function setThreadColor(color, el){

document.querySelectorAll('.color').forEach(c=>{
c.classList.remove('active-color');
});

el.classList.add('active-color');

embroideryText.set({

fill:color

});

canvas.renderAll();

}

/* ICON */

function setIcon(src, btn){

document.querySelectorAll('.icon-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

if(currentIcon){

canvas.remove(currentIcon);

}

fabric.Image.fromURL(src,function(img){

currentIcon = img;

img.set({

left:565,
top:185,

selectable:false,
evented:false

});

img.scaleToWidth(43);

canvas.add(img);

canvas.renderAll();

updateText();

});

}

/* REMOVE ICON */

function removeIcon(btn){

document.querySelectorAll('.icon-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

if(currentIcon){

canvas.remove(currentIcon);

currentIcon = null;

}

updateText();

canvas.renderAll();

}

/* SHIRT */

function setShirt(color, btn){

document.querySelectorAll('.shirt-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

document.querySelectorAll('.color').forEach(c=>{
c.classList.remove('active-color');
});

if(color === 'white'){

loadShirt('biele tricko.png');

embroideryText.set({

fill:'black'

});

document.querySelector('.color[onclick*="black"]').classList.add('active-color');

}else{

loadShirt('cierne tricko.png');

embroideryText.set({

fill:'white'

});

document.querySelector('.color[onclick*="white"]').classList.add('active-color');

}

canvas.renderAll();

}

/* SIZE */

document.querySelectorAll('.size-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

document.querySelectorAll('.size-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

});

});

</script>

</body>
</html>
