<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVODO – Customizer</title>

<style>
body{
    margin:0;
    background:#f3f3f3;
    font-family:Poppins, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    height:100vh;
}

.controls{
    display:flex;
    flex-direction:column;
    gap:10px;
    width:200px;
}

.controls input{
    padding:10px;
    font-size:18px;
    border-radius:8px;
    border:2px solid #ccc;
}

.canvas{
    width:100%;
    max-width:520px;
}
</style>
</head>

<body>

<!-- INPUT -->
<div class="controls">
    <label>Zadaj text (max 16 znakov):</label>
    <input id="textInput" maxlength="16" placeholder="Tvoj text">
</div>

<!-- CELÉ TRIČKO + RÁMČEK + TEXT V JEDNOM SVG -->
<div class="canvas">
<svg id="mainSVG" viewBox="0 0 512 700" width="100%">

    <!-- TRIČKO -->
    <g transform="translate(0,0) scale(1)">
        <path d="M314.56,48S291.78,56,256,56s-58.56-8-58.56-8a31.94,31.94,0,0,0-10.57,1.8L32,104l16.63,88,48.88,5.52A24,24,0,0,1,118.8,222.1L112,464H400l-6.8-241.9a24,24,0,0,1,21.29-24.58L463.37,192,480,104,325.13,49.8A31.94,31.94,0,0,0,314.56,48Z"
              fill="none" stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M333.31,52.66a80,80,0,0,1-154.62,0"
              fill="none" stroke="#000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

<!-- RÁMČEK -->
<rect id="frame"
      x="250" y="200" width="120" height="120"
      fill="none"
      stroke="#ff7cc6"
      stroke-width="2"
      stroke-dasharray="1 6"
      opacity="0.5"
      rx="10"/>

<!-- TEXT -->
<text id="svgText"
      x="310" y="240"
      text-anchor="middle"
      font-family="Poppins"
      font-size="26"
      font-weight="600"
      fill="#000">

    <tspan id="line1" x="310" dy="0"></tspan>
    <tspan id="line2" x="310" dy="28"></tspan>

</text>

</svg>
</div>

<script>
const input = document.getElementById("textInput");
const l1 = document.getElementById("line1");
const l2 = document.getElementById("line2");

input.addEventListener("input", () => {
    let text = input.value.trim();
    const words = text.split(" ");

    let line1 = "";
    let line2 = "";

    for (let w of words) {
        if ((line1 + " " + w).trim().length <= 8) {
            line1 = (line1 + " " + w).trim();
        } else if ((line2 + " " + w).trim().length <= 8) {
            line2 = (line2 + " " + w).trim();
        }
    }

    l1.textContent = line1;
    l2.textContent = line2;
});
</script>

</body>
</html>
