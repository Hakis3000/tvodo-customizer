<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVODO – Customizer</title>

<style>

/* ======== POZADIE – handmade krémové ======== */
body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:linear-gradient(135deg, #f7efe6, #fffdf9);
    display:flex;
    flex-direction:column;
    align-items:center;
    color:#5a4632;
}

/* ======== TOPBAR ======== */
.topbar{
    width:100%;
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(0,0,0,0.05);
    position:sticky;
    top:0;
    z-index:10;
}

.topbar .item{
    padding:12px 22px;
    background:#fff7ef;
    border-radius:16px;
    border:2px solid #e6d5c3;
    cursor:pointer;
    transition:0.25s;
    font-weight:600;
    color:#5a4632;
    box-shadow:0 4px 0 #d8c4ad;
}

.topbar .item:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 0 #c9b39a;
}

/* ======== HLAVNÝ CONTAINER ======== */
.container{
    width:1200px;
    margin-top:40px;
    display:grid;
    grid-template-columns:1fr 380px;
    gap:40px;
}

/* ======== PREVIEW BOX ======== */
.preview-box{
    width:100%;
    padding:40px;
    border-radius:20px;
    background:#fff7ef;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ======== PANEL ======== */
.panel{
    height:calc(100vh - 140px);
    overflow-y:auto;
    padding:25px;
    border-radius:20px;
    background:#fff7ef;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    display:flex;
    flex-direction:column;
    gap:30px;
}

/* ======== SEKČNÉ NADPISY ======== */
.section-title{
    font-weight:700;
    font-size:18px;
    display:flex;
    align-items:center;
    gap:8px;
    color:#5a4632;
}

/* ======== INFO IKONKA ======== */
.info{
    width:18px;
    height:18px;
    background:#d8b48a;
    color:white;
    border-radius:50%;
    font-size:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    position:relative;
}
.info:hover::after{
    content:attr(data-tip);
    position:absolute;
    top:25px;
    left:0;
    background:#5a4632;
    color:white;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
    white-space:nowrap;
}

/* ======== 3D TLAČIDLÁ ======== */
.btn-row{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
}

.btn{
    padding:12px 20px;
    background:#fff;
    border-radius:14px;
    border:2px solid #e6d5c3;
    cursor:pointer;
    transition:0.2s;
    font-weight:600;
    color:#5a4632;
    box-shadow:0 5px 0 #d8c4ad;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 7px 0 #c9b39a;
}

.btn.active{
    background:#f0e2d2;
    border-color:#d8b48a;
    transform:translateY(-4px);
    box-shadow:0 8px 0 #b89a78;
}

/* ======== INPUT ======== */
input{
    padding:14px;
    width:100%;
    border-radius:14px;
    border:2px solid #e6d5c3;
    font-size:16px;
    background:#fff;
    color:#5a4632;
    box-shadow:0 4px 0 #d8c4ad;
}

input:focus{
    outline:none;
    border-color:#d8b48a;
    box-shadow:0 5px 0 #c9b39a;
}

svg{
    max-width:100%;
    height:auto;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="item">Body</div>
    <div class="item">Tričko</div>
    <div class="item">Bryndáčik</div>
    <div class="item">Uterák</div>
</div>

<!-- HLAVNÝ CONTAINER -->
<div class="container">

    <!-- PREVIEW (TRIČKO) -->
    <div class="preview-box">
        <svg id="mainSVG" viewBox="0 0 512 700" width="100%">

            <!-- TVOJE SVG TU BUDE VLOŽENÉ -->
            <!-- ŽIADNA VÝPLŇ, NIČ NAVYŠE -->

            <g transform="translate(0,0) scale(1)">
                <path d="M314.56,48S291.78,56,256,56s-58.56-8-58.56-8a31.94,31.94,0,0,0-10.57,1.8L32,104l16.63,88,48.88,5.52A24,24,0,0,1,118.8,222.1L112,464H400l-6.8-241.9a24,24,0,0,1,21.29-24.58L463.37,192,480,104,325.13,49.8A31.94,31.94,0,0,0,314.56,48Z"
                      fill="none" stroke="#5a4632" stroke-width="8"/>
            </g>

            <rect id="frame"
                  x="250" y="200" width="120" height="120"
                  fill="none"
                  stroke="#d8b48a"
                  stroke-width="2"
                  stroke-dasharray="1 6"
                  opacity="0.5"
                  rx="10"/>

            <text id="svgText"
                  x="310" y="240"
                  text-anchor="middle"
                  font-family="Poppins"
                  font-size="26"
                  font-weight="600"
                  fill="#5a4632">

                <tspan id="line1" x="310" dy="0"></tspan>
                <tspan id="line2" x="310" dy="28"></tspan>

            </text>

        </svg>
    </div>

    <!-- PANEL -->
    <div class="panel">

        <div>
            <div class="section-title">
                Farba trička
                <div class="info" data-tip="Vyber farbu trička.">i</div>
            </div>
            <div class="btn-row" id="shirtColors">
                <div class="btn" data-color="#ffffff">Biela</div>
                <div class="btn" data-color="#000000" style="color:white;">Čierna</div>
            </div>
        </div>

        <div>
            <div class="section-title">
                Veľkosť
                <div class="info" data-tip="Vyber veľkosť.">i</div>
            </div>
            <div class="btn-row" id="sizes">
                <div class="btn">S</div>
                <div class="btn">M</div>
                <div class="btn">L</div>
                <div class="btn">XL</div>
                <div class="btn">2XL</div>
            </div>
        </div>

        <div>
            <div class="section-title">
                Farba nite
                <div class="info" data-tip="Vyber farbu výšivky.">i</div>
            </div>
            <div class="btn-row" id="threadColors">
                <div class="btn" data-thread="#5a4632">Hnedá</div>
                <div class="btn" data-thread="#000000">Čierna</div>
                <div class="btn" data-thread="#ffffff">Biela</div>
                <div class="btn" data-thread="#d8b48a">Krémová</div>
            </div>
        </div>

        <div>
            <div class="section-title">
                Štýl písma
                <div class="info" data-tip="Vyber štýl textu.">i</div>
            </div>
            <div class="btn-row" id="fonts">
                <div class="btn" data-font="Poppins">Klasický</div>
                <div class="btn" data-font="'Comic Sans MS'">Hravý</div>
                <div class="btn" data-font="'Brush Script MT'">Písaný</div>
            </div>
        </div>

        <div>
            <div class="section-title">
                Text
                <div class="info" data-tip="Napíš text, ktorý sa zobrazí na tričku.">i</div>
            </div>
            <input id="textInput" maxlength="16" placeholder="Tvoj text">
        </div>

    </div>

</div>

<script>

/* TEXT */
const input = document.getElementById("textInput");
const l1 = document.getElementById("line1");
const l2 = document.getElementById("line2");

input.addEventListener("input", () => {
    let text = input.value.trim();
    const words = text.split(" ");

    let line1 = "";
    let line2 = "";

    for (let w of words) {
        if ((line1 + " " + w).trim().length <= 8) {
            line1 = (line1 + " " + w).trim();
        } else if ((line2 + " " + w).trim().length <= 8) {
            line2 = (line2 + " " + w).trim();
        }
    }

    l1.textContent = line1;
    l2.textContent = line2;
});

/* FARBA NITE */
document.querySelectorAll("#threadColors .btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        document.querySelectorAll("#threadColors .btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("svgText").setAttribute("fill", btn.dataset.thread);
    });
});

/* FONT */
document.querySelectorAll("#fonts .btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        document.querySelectorAll("#fonts .btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("svgText").setAttribute("font-family", btn.dataset.font);
    });
});

</script>

</body>
</html>
