<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVODO – Customizer</title>

<style>

body{
    margin:0;
    background:#f3f3f3;
    font-family:Poppins, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* ======== PAPIER ======== */
.canvas{
    width:100%;
    max-width:520px;
    aspect-ratio:3/4;
    background:white;
    border-radius:22px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    position:relative;
    overflow:hidden;
}

/* ======== TRIČKO (zoomuje sa) ======== */
.shirt-wrapper{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    transform-origin:center center;
    transition:transform 0.2s ease-out;
}

.product-image{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

/* ======== TVOJ RÁMČEK ram.svg ======== */
.frame-wrapper{
    position:absolute;

    /* veľkosť rámčeka = 1/5 šírky trička */
    width:20%;
    aspect-ratio:1/1;

    /* pozícia – od stredu hore a doprava */
    top:35%;          /* posun hore */
    left:70%;         /* posun doprava */
    transform:translate(-50%, -50%);

    pointer-events:none;
}

.frame-wrapper img{
    width:100%;
    height:100%;
    object-fit:contain;
}

</style>
</head>

<body>

<div class="canvas">

    <!-- TRIČKO -->
    <div class="shirt-wrapper" id="shirtWrapper">
        <img id="productImage" class="product-image" src="tricko.svg">
    </div>

    <!-- TVOJ RÁMČEK -->
    <div class="frame-wrapper">
        <img src="ram.svg">
    </div>

</div>

<script>

/* ======== ZOOM IBA NA TRIČKO ======== */

let zoom = 1;
const shirt = document.getElementById("shirtWrapper");

document.addEventListener("keydown", e=>{
    if(e.key === "+"){
        zoom = Math.min(zoom + 0.1, 3);
        shirt.style.transform = `scale(${zoom})`;
    }
    if(e.key === "-"){
        zoom = Math.max(zoom - 0.1, 0.5);
        shirt.style.transform = `scale(${zoom})`;
    }
    if(e.key === "0"){
        zoom = 1;
        shirt.style.transform = `scale(1)`;
    }
});

</script>

</body>
</html>
