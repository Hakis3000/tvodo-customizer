<!DOCTYPE html>
<html lang="sk">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TVODO Customizer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@600;700&family=Fredoka:wght@500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--pink:#ff78b8;
--blue:#7aa8ff;

--bg1:#fff5fb;
--bg2:#edf4ff;

}

body{

font-family:Poppins,sans-serif;

min-height:100vh;

background:
linear-gradient(
135deg,
var(--bg1),
var(--bg2)
);

display:flex;
justify-content:center;
align-items:center;

padding:14px;

position:relative;

overflow:hidden;
}

/* BACKGROUND */

.bg1,
.bg2{

position:absolute;

border-radius:50%;

filter:blur(120px);

opacity:0.25;

animation:blobMove 14s ease-in-out infinite;
}

.bg1{

width:430px;
height:430px;

background:var(--pink);

top:-150px;
left:-100px;
}

.bg2{

width:430px;
height:430px;

background:var(--blue);

bottom:-150px;
right:-100px;

animation-delay:3s;
}

@keyframes blobMove{

0%{
transform:translate(0px,0px);
}

50%{
transform:translate(30px,-20px);
}

100%{
transform:translate(0px,0px);
}

}

/* APP */

.app{

width:100%;
height:95vh;

max-width:1500px;

background:
rgba(255,255,255,0.55);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,255,255,0.4);

border-radius:36px;

overflow:hidden;

display:flex;

box-shadow:
0 25px 70px rgba(0,0,0,0.1);
}

/* LEFT */

.left{

flex:1.1;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

position:relative;

overflow:hidden;
}

/* PREVIEW */

.preview{

width:100%;
max-width:720px;

position:relative;

animation:floating 6s ease-in-out infinite;
}

@keyframes floating{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-7px);
}

100%{
transform:translateY(0px);
}

}

.preview img{

width:100%;

display:block;

filter:
drop-shadow(0 18px 35px rgba(0,0,0,0.16));

transition:0.22s;
}

/* TV EFFECT */

.tv-static{

animation:tvStatic 0.22s ease;
}

@keyframes tvStatic{

0%{
filter:
contrast(1)
blur(0px);
}

20%{
filter:
contrast(1.4)
blur(1px)
brightness(1.08);
}

60%{
filter:
contrast(0.9)
brightness(1.06);
}

100%{
filter:
contrast(1)
blur(0px);
}

}

/* EMBROIDERY */

.embroidery{

position:absolute;

top:26%;
left:47%;

width:15.8%;

display:flex;
justify-content:center;
align-items:center;

pointer-events:none;
}

.embroidery-content{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

gap:5px;
}

.embroidery-icon{

width:38px;
height:38px;

object-fit:contain;

opacity:0;

transition:0.22s;
}

.embroidery-text{

text-align:center;

line-height:0.95;

font-weight:700;

white-space:pre-line;

word-break:break-word;

max-width:100%;

transition:0.2s;

text-shadow:
0 1px 1px rgba(255,255,255,0.15),
0 2px 3px rgba(0,0,0,0.35);
}

/* RIGHT */

.right{

width:430px;

padding:22px;

overflow-y:auto;

background:
rgba(255,255,255,0.1);

border-left:
1px solid rgba(255,255,255,0.25);
}

/* TITLE */

.title{

font-size:32px;
font-weight:700;

line-height:1.05;

margin-bottom:8px;

background:
linear-gradient(
90deg,
var(--pink),
var(--blue)
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{

font-size:14px;

line-height:1.6;

color:#5f5f5f;

margin-bottom:24px;
}

/* SECTION */

.section{

margin-top:24px;
}

.section-title{

font-size:15px;
font-weight:700;

margin-bottom:12px;
}

/* BUTTONS */

.row{

display:flex;
gap:12px;
flex-wrap:wrap;
}

.btn{

border:none;

padding:14px 18px;

border-radius:18px;

cursor:pointer;

font-weight:600;

background:
rgba(255,255,255,0.82);

box-shadow:
0 8px 18px rgba(0,0,0,0.07);

transition:0.12s;
}

.btn:hover{

transform:
translateY(-3px)
scale(1.03);
}

.btn:active{

transform:scale(0.84);
}

.active{

background:
linear-gradient(
135deg,
var(--pink),
var(--blue)
);

color:white;

box-shadow:
0 12px 24px rgba(122,168,255,0.28);

animation:buttonPulse 0.22s ease;
}

@keyframes buttonPulse{

0%{
transform:scale(0.86);
}

60%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

/* TEXTAREA */

textarea{

width:100%;

padding:18px;

border:none;

border-radius:24px;

background:
rgba(255,255,255,0.82);

font-size:16px;

outline:none;

resize:none;

min-height:88px;

font-family:Poppins,sans-serif;

box-shadow:
0 8px 18px rgba(0,0,0,0.05);
}

/* HELP */

.help{

margin-top:10px;

font-size:13px;

line-height:1.6;

color:#666;
}

/* COLORS */

.colors{

display:flex;
gap:14px;
flex-wrap:wrap;
}

.color{

width:46px;
height:46px;

border-radius:50%;

cursor:pointer;

border:3px solid white;

transition:0.12s;

box-shadow:
0 8px 16px rgba(0,0,0,0.1);
}

.color:hover{

transform:scale(1.12);
}

.color:active{

transform:scale(0.84);
}

.active-color{

outline:4px solid rgba(122,168,255,0.28);

transform:scale(1.12);

animation:buttonPulse 0.22s ease;
}

/* ICONS */

.icons{

display:flex;
gap:14px;
flex-wrap:wrap;
}

.icon-btn{

width:70px;
height:70px;

border:none;

border-radius:22px;

cursor:pointer;

background:
rgba(255,255,255,0.8);

display:flex;
justify-content:center;
align-items:center;

box-shadow:
0 8px 18px rgba(0,0,0,0.07);

transition:0.12s;
}

.icon-btn:hover{

transform:
translateY(-4px)
scale(1.04);
}

.icon-btn:active{

transform:scale(0.84);
}

.icon-btn.active{

background:
linear-gradient(
135deg,
var(--pink),
var(--blue)
);

box-shadow:
0 12px 24px rgba(122,168,255,0.28);

animation:buttonPulse 0.22s ease;
}

.icon-btn img{

width:38px;
height:38px;

object-fit:contain;
}

.remove-icon{

font-size:30px;
font-weight:700;
color:#666;
}

/* INFO */

.info{

margin-top:24px;

padding:18px;

border-radius:24px;

background:
rgba(255,255,255,0.5);

font-size:14px;

line-height:1.7;

color:#5e5e5e;
}

/* ORDER */

.order-btn{

width:100%;

padding:20px;

border:none;

border-radius:26px;

cursor:pointer;

font-size:18px;
font-weight:700;

margin-top:28px;

color:white;

background:
linear-gradient(
135deg,
var(--pink),
var(--blue)
);

box-shadow:
0 14px 30px rgba(122,168,255,0.28);

transition:0.12s;
}

.order-btn:hover{

transform:
translateY(-4px)
scale(1.01);
}

/* CHECKOUT */

.checkout-overlay{

position:fixed;

inset:0;

background:
rgba(0,0,0,0.45);

backdrop-filter:blur(10px);

display:none;

justify-content:center;
align-items:center;

z-index:999;
}

.checkout-box{

width:92%;
max-width:420px;

background:
rgba(255,255,255,0.92);

backdrop-filter:blur(18px);

border-radius:34px;

padding:28px;

box-shadow:
0 30px 60px rgba(0,0,0,0.18);

animation:checkoutOpen 0.28s ease;
}

@keyframes checkoutOpen{

0%{
transform:
translateY(20px)
scale(0.92);

opacity:0;
}

100%{
transform:
translateY(0px)
scale(1);

opacity:1;
}

}

.checkout-title{

font-size:28px;
font-weight:700;

margin-bottom:20px;

background:
linear-gradient(
90deg,
var(--pink),
var(--blue)
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.checkout-summary{

padding:18px;

border-radius:22px;

background:
rgba(255,255,255,0.75);

margin-bottom:18px;

line-height:1.7;

font-size:14px;

color:#555;
}

.checkout-input{

width:100%;

padding:16px;

margin-bottom:14px;

border:none;

border-radius:18px;

font-size:15px;

background:
rgba(255,255,255,0.82);

box-shadow:
0 8px 18px rgba(0,0,0,0.05);

outline:none;
}

.checkout-confirm{

width:100%;

padding:18px;

border:none;

border-radius:22px;

cursor:pointer;

font-size:17px;
font-weight:700;

color:white;

background:
linear-gradient(
135deg,
var(--pink),
var(--blue)
);

box-shadow:
0 14px 30px rgba(122,168,255,0.25);

transition:0.12s;
}

.checkout-confirm:hover{

transform:
translateY(-3px)
scale(1.01);
}

.checkout-close{

width:100%;

margin-top:12px;

padding:14px;

border:none;

border-radius:18px;

cursor:pointer;

background:
rgba(240,240,240,0.8);

font-weight:600;
}

/* MOBILE */

@media(max-width:1100px){

body{

overflow:auto;

padding:0;
}

.app{

flex-direction:column;

height:auto;

border-radius:0;
}

.left{

position:sticky;

top:0;

z-index:20;

background:
linear-gradient(
to bottom,
rgba(255,255,255,0.96),
rgba(255,255,255,0.82)
);

backdrop-filter:blur(14px);

padding:10px;

border-bottom:
1px solid rgba(255,255,255,0.45);
}

.preview{

max-width:300px;
}

.right{

width:100%;

padding:18px;
}

.title{

font-size:28px;
}

}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="app">

<div class="left">

<div class="preview">

<img
id="shirtImage"
src="biele tricko.png"
>

<div class="embroidery">

<div
id="embroideryContent"
class="embroidery-content"
>

<img
id="previewIcon"
class="embroidery-icon"
src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
>

<div
id="previewText"
class="embroidery-text"
>
</div>

</div>

</div>

</div>

</div>

<div class="right">

<div class="title">
Navrhnite si vlastné tričko
</div>

<div class="subtitle">
Vytvorte si vlastnú výšivku jednoducho podľa seba.
</div>

<div class="section">

<div class="section-title">
Farba trička
</div>

<div class="row">

<button
class="btn shirt-btn active"
onclick="setShirt('white', this)"
>
Biele
</button>

<button
class="btn shirt-btn"
onclick="setShirt('black', this)"
>
Čierne
</button>

</div>

</div>

<div class="section">

<div class="section-title">
Veľkosť
</div>

<div class="row">

<button class="btn size-btn">S</button>
<button class="btn size-btn active">M</button>
<button class="btn size-btn">L</button>
<button class="btn size-btn">XL</button>
<button class="btn size-btn">2XL</button>

</div>

</div>

<div class="section">

<div class="section-title">
Text výšivky
</div>

<textarea
id="textInput"
maxlength="30"
placeholder="Napíšte meno alebo text"
oninput="updatePreview()"
></textarea>

<div class="help">
Pre nový riadok použite ENTER.
</div>

</div>

<div class="section">

<div class="section-title">
Štýl textu
</div>

<div class="row">

<button
class="btn font-btn active"
onclick="setFont('Montserrat', this)"
>
Moderný
</button>

<button
class="btn font-btn"
onclick="setFont('Fredoka', this)"
>
Hravý
</button>

<button
class="btn font-btn"
onclick="setFont('Dancing Script', this)"
>
Písaný
</button>

</div>

</div>

<div class="section">

<div class="section-title">
Farba nite
</div>

<div class="colors">

<div class="color active-color"
style="background:black;"
onclick="setThreadColor('black', this)">
</div>

<div class="color"
style="background:white;border:1px solid #ccc;"
onclick="setThreadColor('white', this)">
</div>

<div class="color"
style="background:var(--pink);"
onclick="setThreadColor('#ff78b8', this)">
</div>

<div class="color"
style="background:var(--blue);"
onclick="setThreadColor('#7aa8ff', this)">
</div>

</div>

</div>

<div class="section">

<div class="section-title">
Ikonka
</div>

<div class="icons">

<button class="icon-btn active" onclick="removeIcon(this)">
<div class="remove-icon">✕</div>
</button>

<button class="icon-btn" onclick="setIcon('srdce.png', this)">
<img src="srdce.png">
</button>

<button class="icon-btn" onclick="setIcon('medved.png', this)">
<img src="medved.png">
</button>

<button class="icon-btn" onclick="setIcon('hviezda.png', this)">
<img src="hviezda.png">
</button>

<button class="icon-btn" onclick="setIcon('zajko.png', this)">
<img src="zajko.png">
</button>

</div>

</div>

<div class="info">
Každé tričko vyrábame individuálne podľa zvoleného návrhu.
</div>

<button
class="order-btn"
onclick="sendOrder()"
>
Pokračovať k objednávke
</button>

</div>

</div>

<!-- CHECKOUT -->

<div id="checkoutModal" class="checkout-overlay">

<div class="checkout-box">

<div class="checkout-title">
Dokončenie objednávky
</div>

<div class="checkout-summary" id="checkoutSummary">
</div>

<input
type="text"
id="customerName"
placeholder="Meno a priezvisko"
class="checkout-input"
/>

<input
type="email"
id="customerEmail"
placeholder="Email"
class="checkout-input"
/>

<input
type="tel"
id="customerPhone"
placeholder="Telefón"
class="checkout-input"
/>

<button
class="checkout-confirm"
onclick="submitOrder()"
>
Potvrdiť objednávku
</button>

<button
class="checkout-close"
onclick="closeCheckout()"
>
Zavrieť
</button>

</div>

</div>

<script>

function triggerStatic(){

const shirt =
document.getElementById('shirtImage');

shirt.classList.remove('tv-static');

void shirt.offsetWidth;

shirt.classList.add('tv-static');

}

function updatePreview(){

const text =
document.getElementById('previewText');

const content =
document.getElementById('embroideryContent');

const previewIcon =
document.getElementById('previewIcon');

const currentFont =
text.style.fontFamily;

let input =
document.getElementById('textInput').value;

const hasEnter =
input.includes('\n');

text.innerText = input;

const hasIcon =
previewIcon.style.opacity === '1';

content.style.gap =
hasIcon ? '5px' : '0px';

const lines =
input.split('\n');

const longestLine =
Math.max(...lines.map(line => line.length));

const isHandwritten =
currentFont === 'Dancing Script';

if(!hasEnter){

if(longestLine <= 4){

text.style.fontSize =
isHandwritten ? '34px' : '24px';

}else if(longestLine <= 6){

text.style.fontSize =
isHandwritten ? '30px' : '21px';

}else if(longestLine <= 8){

text.style.fontSize =
isHandwritten ? '26px' : '18px';

}else if(longestLine <= 10){

text.style.fontSize =
isHandwritten ? '22px' : '16px';

}else if(longestLine <= 12){

text.style.fontSize =
isHandwritten ? '18px' : '13px';

}else{

text.style.fontSize =
isHandwritten ? '14px' : '10px';

}

}else{

if(longestLine <= 5){

text.style.fontSize =
isHandwritten ? '28px' : '20px';

}else if(longestLine <= 8){

text.style.fontSize =
isHandwritten ? '24px' : '17px';

}else if(longestLine <= 10){

text.style.fontSize =
isHandwritten ? '20px' : '14px';

}else{

text.style.fontSize =
isHandwritten ? '16px' : '11px';

}

}

}

function setFont(font, btn){

document.querySelectorAll('.font-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

document.getElementById('previewText').style.fontFamily =
font;

updatePreview();

triggerStatic();

}

function setThreadColor(color, el){

document.getElementById('previewText').style.color =
color;

document.querySelectorAll('.color').forEach(c=>{
c.classList.remove('active-color');
});

el.classList.add('active-color');

triggerStatic();

}

function setIcon(icon, btn){

document.querySelectorAll('.icon-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

const previewIcon =
document.getElementById('previewIcon');

previewIcon.src = icon;

previewIcon.style.opacity = '1';

updatePreview();

triggerStatic();

}

function removeIcon(btn){

document.querySelectorAll('.icon-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

const previewIcon =
document.getElementById('previewIcon');

previewIcon.style.opacity = '0';

updatePreview();

triggerStatic();

}

function setShirt(color, btn){

document.querySelectorAll('.shirt-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

const img =
document.getElementById('shirtImage');

const text =
document.getElementById('previewText');

document.querySelectorAll('.color').forEach(c=>{
c.classList.remove('active-color');
});

if(color === 'white'){

img.src = 'biele tricko.png';

text.style.color = 'black';

document.querySelector('.color[onclick*="black"]').classList.add('active-color');

}else{

img.src = 'cierne tricko.png';

text.style.color = 'white';

document.querySelector('.color[onclick*="white"]').classList.add('active-color');

}

triggerStatic();

}

document.querySelectorAll('.size-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

document.querySelectorAll('.size-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

triggerStatic();

});

});

/* OPEN CHECKOUT */

function sendOrder(){

const text =
document.getElementById('previewText').innerText || '-';

const shirt =
document.querySelector('.shirt-btn.active').innerText;

const size =
document.querySelector('.size-btn.active').innerText;

const font =
document.querySelector('.font-btn.active').innerText;

document.getElementById('checkoutSummary').innerHTML =

`
<b>Tričko:</b> ${shirt}<br>
<b>Veľkosť:</b> ${size}<br>
<b>Text:</b> ${text}<br>
<b>Font:</b> ${font}<br>
<b>Cena:</b> 19€
`;

document.getElementById('checkoutModal').style.display =
'flex';

}

/* CLOSE */

function closeCheckout(){

document.getElementById('checkoutModal').style.display =
'none';

}

/* SUBMIT */

async function submitOrder(){

const text =
document.getElementById('previewText').innerText;

const shirt =
document.querySelector('.shirt-btn.active').innerText;

const size =
document.querySelector('.size-btn.active').innerText;

const font =
document.querySelector('.font-btn.active').innerText;

const thread =
document.getElementById('previewText').style.color || 'black';

let icon = 'Bez ikonky';

const activeIcon =
document.querySelector('.icon-btn.active img');

if(activeIcon){

icon =
activeIcon.getAttribute('src');

}

const name =
document.getElementById('customerName').value;

const email =
document.getElementById('customerEmail').value;

const phone =
document.getElementById('customerPhone').value;

if(!name || !email || !phone){

alert("Vyplňte všetky údaje.");

return;

}

const price = "19€";

try{

const response =
await fetch(
"https://script.google.com/macros/s/AKfycbzhW-3SL5g7dIMf4jT1LP0gLtA_owB1zinNjnI_9YCi6XVrLi89rfdBHl4RVEUI9MtNcQ/exec",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name,
email:email,
phone:phone,

text:text,

font:font,

threadColor:thread,

shirtColor:shirt,

size:size,

icon:icon,

price:price

})

});

const data =
await response.json();

document.getElementById('checkoutModal').innerHTML =

`
<div class="checkout-box">

<div class="checkout-title">
Ďakujeme 🙂
</div>

<div class="checkout-summary">

Vaša objednávka bola úspešne odoslaná.<br><br>

<b>Číslo objednávky:</b><br>
${data.orderNumber}<br><br>

Po potvrdení platby začneme s výrobou.

</div>

<button
class="checkout-confirm"
onclick="closeCheckout()"
>
Zavrieť
</button>

</div>
`;

}catch(error){

alert(
"Nastala chyba pri odosielaní objednávky."
);

console.log(error);

}

}

</script>

</body>
</html>
