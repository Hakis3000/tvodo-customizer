<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TVoDo Customizer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Baloo+2:wght@600&family=Pacifico&family=Fredoka:wght@600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Poppins,sans-serif;
background:#ececec;
padding:20px;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:520px;
background:white;
border-radius:28px;
padding:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

.title{
font-size:28px;
font-weight:700;
margin-bottom:20px;
}

.preview{
position:relative;
background:#f7f7f7;
border-radius:22px;
overflow:hidden;
padding:10px;
}

.preview img{
width:100%;
display:block;
}

.embroidery{
position:absolute;
top:31%;
left:22%;
width:20%;
height:12%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
pointer-events:none;
}

.embroidery-text{
font-size:14px;
font-weight:600;
text-align:center;
max-width:100%;
word-break:break-word;
line-height:1.1;
text-shadow:
0 1px 1px rgba(255,255,255,0.15),
0 1px 3px rgba(0,0,0,0.35);
}

.section{
margin-top:24px;
}

.section-title{
font-weight:700;
font-size:17px;
margin-bottom:12px;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
border:none;
background:#f1f1f1;
padding:12px 16px;
border-radius:14px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
transform:translateY(-2px);
}

.active{
background:black;
color:white;
}

input{
width:100%;
padding:15px;
border-radius:16px;
border:none;
background:#f4f4f4;
font-size:16px;
outline:none;
}

.colors{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.color{
width:38px;
height:38px;
border-radius:50%;
cursor:pointer;
border:3px solid white;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
transition:0.2s;
}

.color:hover{
transform:scale(1.08);
}

.footer{
margin-top:30px;
}

.order-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:black;
color:white;
font-size:17px;
font-weight:700;
cursor:pointer;
}

.limit{
font-size:13px;
color:#777;
margin-top:8px;
}

</style>
</head>

<body>

<div class="app">

<div class="title">
Vyšívaj si vlastné tričko
</div>

<div class="preview">

<img
id="shirtImage"
src="ChatGPT Image 21. 5. 2026, 03_32_42.png"
>

<div class="embroidery">

<div
id="previewText"
class="embroidery-text"
>
Sofia
</div>

</div>

</div>

<div class="section">

<div class="section-title">
Farba trička
</div>

<div class="row">

<button
class="btn active"
onclick="setShirt('white', this)"
>
Biele
</button>

<button
class="btn"
onclick="setShirt('black', this)"
>
Čierne
</button>

</div>

</div>

<div class="section">

<div class="section-title">
Text výšivky
</div>

<input
maxlength="12"
placeholder="Napíš meno alebo text"
oninput="updateText(this.value)"
>

<div class="limit">
Maximálne 12 znakov kvôli výšivke 11×11 cm
</div>

</div>

<div class="section">

<div class="section-title">
Font
</div>

<div class="row">

<button class="btn" onclick="setFont('Poppins')">
Základný
</button>

<button class="btn" onclick="setFont('Baloo 2')">
Hravý
</button>

<button class="btn" onclick="setFont('Pacifico')">
Písaný
</button>

<button class="btn" onclick="setFont('Fredoka')">
Tučný
</button>

</div>

</div>

<div class="section">

<div class="section-title">
Farba nite
</div>

<div class="colors">

<div class="color" style="background:white;border:1px solid #ccc;" onclick="setThreadColor('white')"></div>

<div class="color" style="background:black;" onclick="setThreadColor('black')"></div>

<div class="color" style="background:#e0b84f;" onclick="setThreadColor('#e0b84f')"></div>

<div class="color" style="background:#ff5ca8;" onclick="setThreadColor('#ff5ca8')"></div>

<div class="color" style="background:#3d7fff;" onclick="setThreadColor('#3d7fff')"></div>

<div class="color" style="background:#ff3b30;" onclick="setThreadColor('#ff3b30')"></div>

</div>

</div>

<div class="footer">

<button class="order-btn">
Pokračovať k objednávke
</button>

</div>

</div>

<script>

function updateText(value){

document.getElementById('previewText').innerText =
value || 'Sofia';

}

function setFont(font){

document.getElementById('previewText').style.fontFamily =
font;

}

function setThreadColor(color){

document.getElementById('previewText').style.color =
color;

}

function setShirt(color, btn){

document.querySelectorAll('.row .btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

const img =
document.getElementById('shirtImage');

const text =
document.getElementById('previewText');

if(color === 'white'){

img.src =
'ChatGPT Image 21. 5. 2026, 03_32_37.png';

text.style.color =
'black';

}else{

img.src =
'ChatGPT Image 21. 5. 2026, 03_32_42.png';

text.style.color =
'white';

}

}

</script>

</body>
</html>
