<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVODO – Customizer</title>

<style>

/* ======== 1) WRAPPER – pevné okno v strede ======== */

body{
    margin:0;
    background:#f3f3f3;
    font-family:Poppins, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.canvas-wrapper{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* ======== 2) CANVAS – pevné okno, ktoré sa nehýbe ======== */

.canvas{
    width:420px;
    height:600px;
    background:white;
    border-radius:22px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    position:relative;
    overflow:hidden;
    transform:scale(1);
    transition:transform 0.2s ease-out;
}

/* ======== 3) PRODUKT (tričko/body/bryndák) ======== */

.product-image{
    width:100%;
    height:100%;
    object-fit:contain;
    pointer-events:none;
}

/* ======== 4) VÝŠIVKOVÝ ŠTVOREC ======== */

.embroidery-area{
    position:absolute;
    top:32%;
    left:35%;
    width:30%;
    height:30%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

/* ======== 5) IKONKA ======== */

.icon-layer{
    width:40px;
    height:40px;
    object-fit:contain;
    display:none;
    margin-bottom:6px;
}

/* ======== 6) TEXT ======== */

.text-layer{
    font-family:'Montserrat';
    font-size:18px;
    font-weight:700;
    color:#ff7cc6;
    white-space:pre-line;
    text-align:center;
    line-height:1.1;
}

/* ======== 7) ZOOM TLAČIDLÁ ======== */

.zoom-controls{
    position:absolute;
    bottom:16px;
    right:16px;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.zoom-controls button{
    width:42px;
    height:42px;
    border:none;
    border-radius:12px;
    background:#ffffff;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    font-size:22px;
    cursor:pointer;
    transition:0.15s;
}

.zoom-controls button:hover{
    transform:scale(1.08);
}

</style>
</head>

<body>

<div class="canvas-wrapper">

    <div class="canvas" id="canvas">

        <img id="productImage" class="product-image" src="tricko.svg">

        <div class="embroidery-area">
            <img id="iconLayer" class="icon-layer" src="">
            <div id="textLayer" class="text-layer"></div>
        </div>

        <div class="zoom-controls">
            <button id="zoomIn">+</button>
            <button id="zoomOut">−</button>
            <button id="zoomReset">⟳</button>
        </div>

    </div>

</div>

<script>

/* ======== ZOOM LOGIKA ======== */

let zoom = 1;
const canvas = document.getElementById("canvas");

document.getElementById("zoomIn").onclick = ()=>{
    zoom = Math.min(zoom + 0.1, 2.5);
    canvas.style.transform = `scale(${zoom})`;
};

document.getElementById("zoomOut").onclick = ()=>{
    zoom = Math.max(zoom - 0.1, 0.8);
    canvas.style.transform = `scale(${zoom})`;
};

document.getElementById("zoomReset").onclick = ()=>{
    zoom = 1;
    canvas.style.transform = `scale(1)`;
};

</script>

</body>
</html>
