<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TVoDo Customizer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Baloo+2:wght@600&family=Pacifico&family=Fredoka:wght@600&display=swap" rel="stylesheet">

  <style>

    body{
      margin:0;
      font-family:Poppins,sans-serif;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      padding:20px;
    }

    .app{
      width:100%;
      max-width:500px;
      background:white;
      border-radius:20px;
      padding:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    .preview{
      position:relative;
      width:100%;
    }

    .preview img{
      width:100%;
    }

    .embroidery{
      position:absolute;
      top:30%;
      left:32%;
      width:22%;
      height:22%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
    }

    .embroidery-text{
      font-size:18px;
      font-weight:600;
      color:black;
      text-shadow:1px 1px 2px rgba(0,0,0,0.25);
      word-break:break-word;
      max-width:100%;
    }

    h2{
      margin-top:25px;
    }

    .buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      padding:10px 15px;
      border-radius:12px;
      cursor:pointer;
      font-weight:600;
    }

    .active{
      background:black;
      color:white;
    }

    input{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #ccc;
      font-size:16px;
    }

  </style>
</head>

<body>

<div class="app">

  <div class="preview">
    <img id="shirtImage" src="ChatGPT Image 21. 5. 2026, 03_32_37.png">

    <div class="embroidery">
      <div id="previewText" class="embroidery-text">
        Sofia
      </div>
    </div>
  </div>

  <h2>Farba trička</h2>

  <div class="buttons">
    <button class="active" onclick="setShirt('white', this)">Biele</button>
    <button onclick="setShirt('black', this)">Čierne</button>
  </div>

  <h2>Text</h2>

  <input
    maxlength="12"
    placeholder="Napíš text"
    oninput="updateText(this.value)"
  >

  <h2>Font</h2>

  <div class="buttons">
    <button onclick="setFont('Poppins')">Základný</button>
    <button onclick="setFont('Baloo 2')">Hravý</button>
    <button onclick="setFont('Pacifico')">Písaný</button>
    <button onclick="setFont('Fredoka')">Tučný</button>
  </div>

</div>

<script>

function updateText(value){
  document.getElementById('previewText').innerText = value || 'Sofia';
}

function setFont(font){
  document.getElementById('previewText').style.fontFamily = font;
}

function setShirt(color, btn){

  document.querySelectorAll('.buttons button').forEach(b=>{
    b.classList.remove('active');
  });

  btn.classList.add('active');

  const img = document.getElementById('shirtImage');

  if(color === 'white'){
    img.src = 'ChatGPT Image 21. 5. 2026, 03_32_37.png';
    document.getElementById('previewText').style.color = 'black';
  }else{
    img.src = 'ChatGPT Image 21. 5. 2026, 03_32_42.png';
    document.getElementById('previewText').style.color = 'white';
  }

}

</script>

</body>
</html>
