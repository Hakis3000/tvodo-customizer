<!DOCTYPE html>
<html lang="sk">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TVODO Customizer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@600;700&family=Fredoka:wght@500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Poppins,sans-serif;

height:100vh;

overflow:hidden;

background:
linear-gradient(
135deg,
#f7d7ff 0%,
#dbe7ff 35%,
#fff0c7 70%,
#d7fff1 100%
);

display:flex;
justify-content:center;
align-items:center;

padding:16px;

position:relative;
}

/* SOFT BACKGROUND */

.bg1,
.bg2,
.bg3,
.bg4{

position:absolute;

border-radius:50%;

filter:blur(130px);

opacity:0.28;

animation:blobMove 14s ease-in-out infinite;
}

.bg1{
width:420px;
height:420px;
background:#ff73b9;
top:-140px;
left:-100px;
}

.bg2{
width:420px;
height:420px;
background:#73a7ff;
bottom:-120px;
right:-100px;
animation-delay:2s;
}

.bg3{
width:320px;
height:320px;
background:#ffe07d;
top:50%;
left:40%;
animation-delay:5s;
}

.bg4{
width:260px;
height:260px;
background:#8dffd7;
top:10%;
right:20%;
animation-delay:7s;
}

@keyframes blobMove{

0%{
transform:translate(0px,0px);
}

50%{
transform:translate(40px,-20px);
}

100%{
transform:translate(0px,0px);
}

}

/* APP */

.app{

width:100%;
height:100%;

max-width:1550px;

background:
rgba(255,255,255,0.55);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.35);

border-radius:38px;

overflow:hidden;

display:flex;

box-shadow:
0 30px 80px rgba(0,0,0,0.12);

position:relative;
}

/* LEFT */

.left{

flex:1.15;

display:flex;
justify-content:center;
align-items:center;

padding:30px;

position:relative;

overflow:hidden;
}

/* PREVIEW */

.preview{

width:100%;
max-width:760px;

position:relative;

z-index:2;

animation:floating 6s ease-in-out infinite;

transition:0.25s;
}

@keyframes floating{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0px);
}

}

.preview img{

width:100%;

display:block;

filter:
drop-shadow(0 20px 40px rgba(0,0,0,0.18));

transition:0.25s;
}

/* TV STATIC EFFECT */

.tv-static{

animation:tvStatic 0.22s ease;
}

@keyframes tvStatic{

0%{
filter:
contrast(1)
blur(0px)
drop-shadow(0 20px 40px rgba(0,0,0,0.18));
transform:translateX(0px);
}

20%{
filter:
contrast(1.5)
blur(1px)
saturate(1.3)
drop-shadow(0 20px 40px rgba(0,0,0,0.18));

transform:translateX(-1px);
}

40%{
filter:
contrast(0.9)
blur(0px)
brightness(1.08)
drop-shadow(0 20px 40px rgba(0,0,0,0.18));

transform:translateX(1px);
}

60%{
filter:
contrast(1.3)
blur(0.6px)
drop-shadow(0 20px 40px rgba(0,0,0,0.18));

transform:translateX(-1px);
}

100%{
filter:
contrast(1)
blur(0px)
drop-shadow(0 20px 40px rgba(0,0,0,0.18));

transform:translateX(0px);
}

}

/* EMBROIDERY */

.embroidery{

position:absolute;

top:31%;
left:47%;

width:17%;
height:12%;

display:flex;
justify-content:center;
align-items:center;

pointer-events:none;
}

.embroidery-content{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

gap:5px;

transition:0.25s;
}

.embroidery-icon{

width:38px;
height:38px;

object-fit:contain;

opacity:0;

transition:0.25s;
}

.embroidery-text{

text-align:center;

line-height:1;

font-weight:700;

font-size:20px;

white-space:pre-line;

word-break:break-word;

transition:0.25s;

max-width:100%;

text-shadow:
0 1px 1px rgba(255,255,255,0.15),
0 2px 3px rgba(0,0,0,0.35);
}

/* RIGHT */

.right{

width:430px;

padding:24px;

overflow-y:auto;

background:
rgba(255,255,255,0.16);

backdrop-filter:blur(14px);

border-left:
1px solid rgba(255,255,255,0.25);

position:relative;
}

/* FIXED TOP */

.top-header{

position:sticky;

top:0;

z-index:10;

padding-bottom:16px;

background:
linear-gradient(
to bottom,
rgba(255,255,255,0.88),
rgba(255,255,255,0.4),
transparent
);

backdrop-filter:blur(12px);
}

.title{

font-size:33px;
font-weight:700;

line-height:1.05;

margin-bottom:8px;

background:
linear-gradient(
90deg,
#ff5eb3,
#7b88ff,
#ffcb4d,
#4ac8a5
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{

font-size:14px;

line-height:1.6;

color:#5e5e5e;
}

/* SECTION */

.section{

margin-top:22px;
}

.section-title{

font-size:15px;
font-weight:700;

margin-bottom:12px;
}

/* BUTTONS */

.row{

display:flex;
gap:12px;
flex-wrap:wrap;
}

.btn{

border:none;

padding:14px 18px;

border-radius:18px;

cursor:pointer;

font-weight:600;

background:
rgba(255,255,255,0.78);

backdrop-filter:blur(10px);

box-shadow:
0 8px 18px rgba(0,0,0,0.08);

transition:0.12s;

position:relative;
}

.btn:hover{

transform:
translateY(-3px)
scale(1.03);
}

/* BUTTON CLICK */

.btn:active{

transform:
scale(0.86);

box-shadow:
inset 0 5px 12px rgba(0,0,0,0.15);
}

.active{

background:
linear-gradient(
135deg,
#ff73b9,
#7ba6ff,
#ffd866
);

color:white;

box-shadow:
0 12px 28px rgba(123,166,255,0.35);

animation:buttonPulse 0.25s ease;
}

@keyframes buttonPulse{

0%{
transform:scale(0.88);
}

60%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

/* TEXTAREA */

textarea{

width:100%;

padding:18px;

border:none;

border-radius:24px;

background:
rgba(255,255,255,0.78);

backdrop-filter:blur(10px);

font-size:16px;

outline:none;

resize:none;

min-height:88px;

font-family:Poppins,sans-serif;

box-shadow:
0 8px 18px rgba(0,0,0,0.06);

transition:0.25s;
}

textarea:focus{

transform:scale(1.01);

box-shadow:
0 10px 24px rgba(123,166,255,0.18);
}

/* HELP */

.help{

margin-top:10px;

font-size:13px;

line-height:1.6;

color:#666;
}

/* COLORS */

.colors{

display:flex;
gap:14px;
flex-wrap:wrap;
}

.color{

width:46px;
height:46px;

border-radius:50%;

cursor:pointer;

border:3px solid white;

transition:0.14s;

box-shadow:
0 8px 16px rgba(0,0,0,0.12);
}

.color:hover{

transform:scale(1.12);
}

.color:active{

transform:scale(0.84);
}

.active-color{

outline:4px solid rgba(255,214,102,0.45);

transform:scale(1.12);

animation:buttonPulse 0.25s ease;
}

/* ICONS */

.icons{

display:flex;
gap:14px;
flex-wrap:wrap;
}

.icon-btn{

width:70px;
height:70px;

border:none;

border-radius:22px;

cursor:pointer;

background:
rgba(255,255,255,0.74);

backdrop-filter:blur(12px);

display:flex;
justify-content:center;
align-items:center;

box-shadow:
0 8px 18px rgba(0,0,0,0.08);

transition:0.12s;
}

.icon-btn:hover{

transform:
translateY(-4px)
scale(1.04);
}

.icon-btn:active{

transform:scale(0.84);
}

.icon-btn.active{

background:
linear-gradient(
135deg,
#ff73b9,
#7ba6ff,
#ffd866
);

box-shadow:
0 12px 28px rgba(123,166,255,0.35);

animation:buttonPulse 0.25s ease;
}

.icon-btn img{

width:38px;
height:38px;
object-fit:contain;
}

.remove-icon{

font-size:30px;
font-weight:700;
color:#666;
}

/* INFO */

.info{

margin-top:26px;

padding:18px;

border-radius:24px;

background:
rgba(255,255,255,0.5);

font-size:14px;

line-height:1.7;

color:#5e5e5e;

box-shadow:
0 8px 18px rgba(0,0,0,0.05);
}

/* FIXED ORDER */

.bottom-order{

position:sticky;

bottom:0;

padding-top:18px;

margin-top:20px;

background:
linear-gradient(
to top,
rgba(255,255,255,0.9),
rgba(255,255,255,0.4),
transparent
);

backdrop-filter:blur(12px);
}

.order-btn{

width:100%;

padding:20px;

border:none;

border-radius:26px;

cursor:pointer;

font-size:18px;
font-weight:700;

color:white;

background:
linear-gradient(
135deg,
#ff5eb3,
#7ba6ff,
#ffd866
);

box-shadow:
0 14px 30px rgba(123,166,255,0.35);

transition:0.12s;
}

.order-btn:hover{

transform:
translateY(-4px)
scale(1.01);
}

.order-btn:active{

transform:scale(0.9);
}

/* MOBILE */

@media(max-width:1100px){

body{
overflow:auto;
height:auto;
}

.app{
flex-direction:column;
height:auto;
}

.right{
width:100%;
}

.preview{
max-width:560px;
}

}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>
<div class="bg4"></div>

<div class="app">

<!-- LEFT -->

<div class="left">

<div class="preview">

<img
id="shirtImage"
src="biele tricko.png"
>

<div class="embroidery">

<div
id="embroideryContent"
class="embroidery-content"
>

<img
id="previewIcon"
class="embroidery-icon"
src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
>

<div
id="previewText"
class="embroidery-text"
>
</div>

</div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right">

<div class="top-header">

<div class="title">
Navrhnite si vlastné tričko
</div>

<div class="subtitle">
Vytvorte si vlastnú výšivku jednoducho podľa seba.
</div>

</div>

<!-- SHIRT -->

<div class="section">

<div class="section-title">
Farba trička
</div>

<div class="row">

<button
class="btn shirt-btn active"
onclick="setShirt('white', this)"
>
Biele
</button>

<button
class="btn shirt-btn"
onclick="setShirt('black', this)"
>
Čierne
</button>

</div>

</div>

<!-- SIZE -->

<div class="section">

<div class="section-title">
Veľkosť
</div>

<div class="row">

<button class="btn size-btn">S</button>
<button class="btn size-btn active">M</button>
<button class="btn size-btn">L</button>
<button class="btn size-btn">XL</button>
<button class="btn size-btn">2XL</button>

</div>

</div>

<!-- TEXT -->

<div class="section">

<div class="section-title">
Text výšivky
</div>

<textarea
id="textInput"
maxlength="18"
placeholder="Napíšte meno alebo text"
oninput="updatePreview()"
></textarea>

<div class="help">
Text sa automaticky prispôsobí vzhľadu výšivky.
</div>

</div>

<!-- FONT -->

<div class="section">

<div class="section-title">
Štýl textu
</div>

<div class="row">

<button
class="btn font-btn active"
onclick="setFont('Montserrat', this)"
>
Moderný
</button>

<button
class="btn font-btn"
onclick="setFont('Fredoka', this)"
>
Hravý
</button>

<button
class="btn font-btn"
onclick="setFont('Dancing Script', this)"
>
Písaný
</button>

</div>

</div>

<!-- COLORS -->

<div class="section">

<div class="section-title">
Farba nite
</div>

<div class="colors">

<div class="color active-color"
style="background:black;"
onclick="setThreadColor('black', this)">
</div>

<div class="color"
style="background:white;border:1px solid #ccc;"
onclick="setThreadColor('white', this)">
</div>

<div class="color"
style="background:#ff5eb3;"
onclick="setThreadColor('#ff5eb3', this)">
</div>

<div class="color"
style="background:#7ba6ff;"
onclick="setThreadColor('#7ba6ff', this)">
</div>

<div class="color"
style="background:#ffd866;"
onclick="setThreadColor('#ffd866', this)">
</div>

<div class="color"
style="background:#4ac8a5;"
onclick="setThreadColor('#4ac8a5', this)">
</div>

</div>

</div>

<!-- ICONS -->

<div class="section">

<div class="section-title">
Ikonka
</div>

<div class="icons">

<button class="icon-btn active" onclick="removeIcon(this)">
<div class="remove-icon">✕</div>
</button>

<button class="icon-btn" onclick="setIcon('srdce.png', this)">
<img src="srdce.png">
</button>

<button class="icon-btn" onclick="setIcon('medved.png', this)">
<img src="medved.png">
</button>

<button class="icon-btn" onclick="setIcon('hviezda.png', this)">
<img src="hviezda.png">
</button>

<button class="icon-btn" onclick="setIcon('zajko.png', this)">
<img src="zajko.png">
</button>

</div>

</div>

<div class="info">
Každé tričko vyrábame individuálne podľa zvoleného návrhu.
</div>

<div class="bottom-order">

<button class="order-btn">
Pokračovať k objednávke
</button>

</div>

</div>

</div>

<script>

function triggerStatic(){

const shirt =
document.getElementById('shirtImage');

shirt.classList.remove('tv-static');

void shirt.offsetWidth;

shirt.classList.add('tv-static');

}

/* PREVIEW */

function updatePreview(){

const text =
document.getElementById('previewText');

const content =
document.getElementById('embroideryContent');

const previewIcon =
document.getElementById('previewIcon');

const currentFont =
text.style.fontFamily;

let input =
document.getElementById('textInput').value;

if(!input.includes('\n')){

if(input.length > 8){

const first =
input.substring(0,8);

const second =
input.substring(8);

input =
first + '\n' + second;

}

}

text.innerText = input;

const hasIcon =
previewIcon.style.opacity === '1';

content.style.gap =
hasIcon ? '5px' : '0px';

const longestLine =
Math.max(...input.split('\n').map(line => line.length));

const lineCount =
input.split('\n').length;

const isHandwritten =
currentFont === 'Dancing Script';

if(lineCount >= 2){

if(longestLine <= 5){

text.style.fontSize =
isHandwritten ? '25px' : '18px';

}else if(longestLine <= 8){

text.style.fontSize =
isHandwritten ? '22px' : '16px';

}else{

text.style.fontSize =
isHandwritten ? '18px' : '13px';

}

}else{

if(longestLine <= 5){

text.style.fontSize =
isHandwritten ? '30px' : '21px';

}else if(longestLine <= 8){

text.style.fontSize =
isHandwritten ? '25px' : '18px';

}else{

text.style.fontSize =
isHandwritten ? '20px' : '15px';

}

}

}

/* FONT */

function setFont(font, btn){

document.querySelectorAll('.font-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

const text =
document.getElementById('previewText');

text.style.fontFamily = font;

updatePreview();

triggerStatic();

}

/* THREAD */

function setThreadColor(color, el){

document.getElementById('previewText').style.color =
color;

document.querySelectorAll('.color').forEach(c=>{
c.classList.remove('active-color');
});

el.classList.add('active-color');

triggerStatic();

}

/* ICON */

function setIcon(icon, btn){

document.querySelectorAll('.icon-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

const previewIcon =
document.getElementById('previewIcon');

previewIcon.src = icon;

previewIcon.style.opacity = '1';

updatePreview();

triggerStatic();

}

/* REMOVE ICON */

function removeIcon(btn){

document.querySelectorAll('.icon-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

const previewIcon =
document.getElementById('previewIcon');

previewIcon.style.opacity = '0';

updatePreview();

triggerStatic();

}

/* SHIRT */

function setShirt(color, btn){

document.querySelectorAll('.shirt-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

const img =
document.getElementById('shirtImage');

const text =
document.getElementById('previewText');

document.querySelectorAll('.color').forEach(c=>{
c.classList.remove('active-color');
});

if(color === 'white'){

img.src = 'biele tricko.png';

text.style.color = 'black';

document.querySelector('.color[onclick*=\"black\"]').classList.add('active-color');

}else{

img.src = 'cierne tricko.png';

text.style.color = 'white';

document.querySelector('.color[onclick*=\"white\"]').classList.add('active-color');

}

triggerStatic();

}

/* SIZE */

document.querySelectorAll('.size-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

document.querySelectorAll('.size-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

triggerStatic();

});

});

</script>

</body>
</html>
