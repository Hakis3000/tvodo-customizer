<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVODO – Customizer</title>

<style>

body{
    margin:0;
    background:#f3f3f3;
    font-family:Poppins, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* ======== PAPIER ======== */
.canvas{
    width:100%;
    max-width:520px;
    aspect-ratio:3/4;
    background:white;
    border-radius:22px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    position:relative;
    overflow:hidden;
}

/* ======== TRIČKO (zoomuje sa) ======== */
.shirt-wrapper{
    position:absolute;
    inset:0;

    /* CENTROVANIE BEZ POSUNU */
    display:flex;
    justify-content:center;
    align-items:center;

    transform-origin:center center;
    transition:transform 0.2s ease-out;
}

.product-image{
    width:100%;
    height:100%;
    object-fit:contain; /* aby sa nič neodseklo */
    pointer-events:none;
}

/* ======== RÁMČEK (ružové malé bodky) ======== */
.frame-wrapper{
    position:absolute;

    /* ZMENŠENIE O 30 % → pôvodne 40%, teraz 28% */
    width:28%;
    aspect-ratio:1/1;

    /* POSUN NIŽŠIE A DOPRAVA */
    top:40%;
    left:68%;
    transform:translate(-50%, -50%);

    pointer-events:none;
}

.frame-wrapper svg{
    width:100%;
    height:100%;
}

.frame-wrapper rect{
    fill:transparent; 
    stroke:#ff7cc6;   
    stroke-width:4;

    /* MALÉ BODKY */
    stroke-dasharray:1 12;
    stroke-linecap:round;

    rx:18;
}

</style>
</head>

<body>

<div class="canvas">

    <!-- TRIČKO -->
    <div class="shirt-wrapper" id="shirtWrapper">
        <img id="productImage" class="product-image" src="tricko.svg">
    </div>

    <!-- RÁMČEK -->
    <div class="frame-wrapper">
        <svg viewBox="0 0 100 100">
            <rect x="0" y="0" width="100" height="100"></rect>
        </svg>
    </div>

</div>

<script>

/* ======== ZOOM IBA NA TRIČKO ======== */

let zoom = 1;
const shirt = document.getElementById("shirtWrapper");

document.addEventListener("keydown", e=>{
    if(e.key === "+"){
        zoom = Math.min(zoom + 0.1, 3);
        shirt.style.transform = `scale(${zoom})`;
    }
    if(e.key === "-"){
        zoom = Math.max(zoom - 0.1, 0.5);
        shirt.style.transform = `scale(${zoom})`;
    }
    if(e.key === "0"){
        zoom = 1;
        shirt.style.transform = `scale(1)`;
    }
});

</script>

</body>
</html>
