<!DOCTYPE html>
<html lang="sk">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TVODO Customizer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@600;700&family=Fredoka:wght@500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--pink:#ff7bc2;
--blue:#7dafff;

--bg1:#fff5fb;
--bg2:#edf4ff;

--glass:
rgba(255,255,255,0.55);

}

/* BODY */

body{

font-family:Poppins,sans-serif;

min-height:100vh;

background:
linear-gradient(
135deg,
var(--bg1),
var(--bg2)
);

display:flex;
justify-content:center;
align-items:center;

padding:14px;

position:relative;

overflow:hidden;
}

/* BACKGROUND BLOBS */

.bg1,
.bg2{

position:absolute;

border-radius:50%;

filter:blur(120px);

opacity:0.22;

animation:blobMove 15s ease-in-out infinite;
}

.bg1{

width:420px;
height:420px;

background:var(--pink);

top:-120px;
left:-100px;
}

.bg2{

width:420px;
height:420px;

background:var(--blue);

bottom:-120px;
right:-100px;

animation-delay:4s;
}

@keyframes blobMove{

0%{
transform:translate(0px,0px);
}

50%{
transform:translate(35px,-25px);
}

100%{
transform:translate(0px,0px);
}

}

/* APP */

.app{

width:100%;
max-width:1500px;

height:95vh;

display:flex;

overflow:hidden;

border-radius:36px;

background:var(--glass);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,255,255,0.45);

box-shadow:
0 25px 70px rgba(0,0,0,0.1);

position:relative;

z-index:5;
}

/* LEFT */

.left{

flex:1.1;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

overflow:hidden;

position:relative;
}

/* PREVIEW */

.preview{

position:relative;

width:min(78vw,720px);

aspect-ratio:1/1;

display:flex;
justify-content:center;
align-items:center;

animation:floating 6s ease-in-out infinite;
}

@keyframes floating{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-7px);
}

100%{
transform:translateY(0px);
}

}

.preview img{

width:100%;
height:100%;

object-fit:contain;

display:block;

filter:
drop-shadow(0 18px 35px rgba(0,0,0,0.16));

transition:0.22s;
}

/* STATIC EFFECT */

.tv-static{

animation:tvStatic 0.22s ease;
}

@keyframes tvStatic{

0%{
filter:
contrast(1)
blur(0px);
}

20%{
filter:
contrast(1.4)
blur(1px)
brightness(1.08);
}

60%{
filter:
contrast(0.9)
brightness(1.06);
}

100%{
filter:
contrast(1)
blur(0px);
}

}

/* EMBROIDERY */

.embroidery{

position:absolute;

top:24.8%;
left:44.8%;

width:110px;
height:110px;

display:flex;
justify-content:center;
align-items:center;

pointer-events:none;

transform:
translate(-50%,-50%);
}

.embroidery-content{

width:100%;
height:100%;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

gap:5px;
}

.embroidery-icon{

width:34px;
height:34px;

object-fit:contain;

opacity:0;

transition:0.22s;
}

.embroidery-text{

width:100%;
max-width:100%;

overflow:hidden;

text-align:center;

white-space:pre-line;

word-break:break-word;

line-height:0.92;

font-weight:700;

transition:0.18s;

text-shadow:
0 1px 1px rgba(255,255,255,0.15),
0 2px 3px rgba(0,0,0,0.35);
}

/* RIGHT */

.right{

width:430px;

overflow-y:auto;

padding:24px;

background:
rgba(255,255,255,0.12);

border-left:
1px solid rgba(255,255,255,0.25);
}

/* SCROLL */

.right::-webkit-scrollbar{

width:8px;
}

.right::-webkit-scrollbar-thumb{

background:
linear-gradient(
180deg,
var(--pink),
var(--blue)
);

border-radius:20px;
}

/* TITLE */

.title{

font-size:34px;
font-weight:700;

line-height:1.05;

margin-bottom:8px;

background:
linear-gradient(
90deg,
var(--pink),
var(--blue)
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{

font-size:14px;

line-height:1.6;

color:#606060;

margin-bottom:26px;
}

/* SECTION */

.section{

margin-top:24px;
}

.section-title{

font-size:15px;
font-weight:700;

margin-bottom:12px;
}

/* ROW */

.row{

display:flex;
gap:12px;
flex-wrap:wrap;
}

/* BUTTON */

.btn{

border:none;

padding:14px 18px;

border-radius:18px;

cursor:pointer;

font-weight:600;

font-size:15px;

background:
rgba(255,255,255,0.82);

box-shadow:
0 8px 18px rgba(0,0,0,0.07);

transition:0.12s;
}

.btn:hover{

transform:
translateY(-3px)
scale(1.03);
}

.btn:active{

transform:scale(0.84);
}

.active{

background:
linear-gradient(
135deg,
var(--pink),
var(--blue)
);

color:white;

box-shadow:
0 12px 24px rgba(122,168,255,0.28);

animation:buttonPulse 0.22s ease;
}

@keyframes buttonPulse{

0%{
transform:scale(0.86);
}

60%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

/* TEXTAREA */

textarea{

width:100%;

padding:18px;

border:none;

border-radius:24px;

background:
rgba(255,255,255,0.82);

font-size:16px;

outline:none;

resize:none;

min-height:90px;

font-family:Poppins,sans-serif;

box-shadow:
0 8px 18px rgba(0,0,0,0.05);
}

textarea:focus{

box-shadow:
0 0 0 4px rgba(125,175,255,0.18);
}

/* HELP */

.help{

margin-top:10px;

font-size:13px;

line-height:1.6;

color:#666;
}

/* COLORS */

.colors{

display:flex;
gap:14px;
flex-wrap:wrap;
}

.color{

width:46px;
height:46px;

border-radius:50%;

cursor:pointer;

border:3px solid white;

transition:0.12s;

box-shadow:
0 8px 16px rgba(0,0,0,0.1);
}

.color:hover{

transform:scale(1.12);
}

.color:active{

transform:scale(0.84);
}

.active-color{

outline:4px solid rgba(122,168,255,0.28);

transform:scale(1.12);

animation:buttonPulse 0.22s ease;
}

/* ICONS */

.icons{

display:flex;
gap:14px;
flex-wrap:wrap;
}

.icon-btn{

width:70px;
height:70px;

border:none;

border-radius:22px;

cursor:pointer;

background:
rgba(255,255,255,0.82);

display:flex;
justify-content:center;
align-items:center;

box-shadow:
0 8px 18px rgba(0,0,0,0.07);

transition:0.12s;
}

.icon-btn:hover{

transform:
translateY(-4px)
scale(1.04);
}

.icon-btn:active{

transform:scale(0.84);
}

.icon-btn.active{

background:
linear-gradient(
135deg,
var(--pink),
var(--blue)
);

box-shadow:
0 12px 24px rgba(122,168,255,0.28);
}

.icon-btn img{

width:38px;
height:38px;

object-fit:contain;
}

.remove-icon{

font-size:30px;
font-weight:700;
color:#666;
}

/* INFO */

.info{

margin-top:24px;

padding:18px;

border-radius:24px;

background:
rgba(255,255,255,0.5);

font-size:14px;

line-height:1.7;

color:#5e5e5e;
}

/* ORDER */

.order-btn{

width:100%;

padding:20px;

border:none;

border-radius:26px;

cursor:pointer;

font-size:18px;
font-weight:700;

margin-top:28px;

color:white;

background:
linear-gradient(
135deg,
var(--pink),
var(--blue)
);

box-shadow:
0 14px 30px rgba(122,168,255,0.28);

transition:0.12s;
}

.order-btn:hover{

transform:
translateY(-4px)
scale(1.01);
}

.order-btn:active{

transform:scale(0.9);
}

/* MOBILE */

@media(max-width:1100px){

body{

overflow:auto;

padding:0;
}

.app{

flex-direction:column;

height:auto;

border-radius:0;
}

.left{

position:sticky;

top:0;

z-index:20;

background:
linear-gradient(
to bottom,
rgba(255,255,255,0.96),
rgba(255,255,255,0.82)
);

backdrop-filter:blur(14px);

padding:10px;

border-bottom:
1px solid rgba(255,255,255,0.45);
}

.preview{

width:min(96vw,420px);
}

.right{

width:100%;

padding:18px;
}

.title{

font-size:28px;
}

.btn{

padding:13px 16px;

font-size:14px;
}

.icon-btn{

width:64px;
height:64px;
}

.icon-btn img{

width:34px;
height:34px;
}

textarea{

font-size:16px;

min-height:82px;
}

.order-btn{

padding:18px;

font-size:17px;
}

/* KEEP SAME POSITION */

.embroidery{

top:24.8%;
left:44.8%;

width:110px;
height:110px;
}

}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="app">

<!-- LEFT -->

<div class="left">

<div class="preview">

<img
id="shirtImage"
src="biele tricko.png"
>

<div class="embroidery">

<div
id="embroideryContent"
class="embroidery-content"
>

<img
id="previewIcon"
class="embroidery-icon"
src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
>

<div
id="previewText"
class="embroidery-text"
>
</div>

</div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="right">

<div class="title">
Navrhnite si vlastné tričko
</div>

<div class="subtitle">
Vytvorte si vlastnú výšivku jednoducho podľa seba.
</div>

<!-- SHIRT -->

<div class="section">

<div class="section-title">
Farba trička
</div>

<div class="row">

<button
class="btn shirt-btn active"
onclick="setShirt('white', this)"
>
Biele
</button>

<button
class="btn shirt-btn"
onclick="setShirt('black', this)"
>
Čierne
</button>

</div>

</div>

<!-- SIZE -->

<div class="section">

<div class="section-title">
Veľkosť
</div>

<div class="row">

<button class="btn size-btn">S</button>
<button class="btn size-btn active">M</button>
<button class="btn size-btn">L</button>
<button class="btn size-btn">XL</button>
<button class="btn size-btn">2XL</button>

</div>

</div>

<!-- TEXT -->

<div class="section">

<div class="section-title">
Text výšivky
</div>

<textarea
id="textInput"
maxlength="30"
placeholder="Napíšte meno alebo text"
oninput="updatePreview()"
></textarea>

<div class="help">
Pre nový riadok použite ENTER.
</div>

</div>

<!-- FONT -->

<div class="section">

<div class="section-title">
Štýl textu
</div>

<div class="row">

<button
class="btn font-btn active"
onclick="setFont('Montserrat', this)"
>
Moderný
</button>

<button
class="btn font-btn"
onclick="setFont('Fredoka', this)"
>
Hravý
</button>

<button
class="btn font-btn"
onclick="setFont('Dancing Script', this)"
>
Písaný
</button>

</div>

</div>

<!-- THREAD -->

<div class="section">

<div class="section-title">
Farba nite
</div>

<div class="colors">

<div class="color active-color"
style="background:black;"
onclick="setThreadColor('black', this)">
</div>

<div class="color"
style="background:white;border:1px solid #ccc;"
onclick="setThreadColor('white', this)">
</div>

<div class="color"
style="background:#ff78b8;"
onclick="setThreadColor('#ff78b8', this)">
</div>

<div class="color"
style="background:#7aa8ff;"
onclick="setThreadColor('#7aa8ff', this)">
</div>

</div>

</div>

<!-- ICON -->

<div class="section">

<div class="section-title">
Ikonka
</div>

<div class="icons">

<button class="icon-btn active" onclick="removeIcon(this)">
<div class="remove-icon">✕</div>
</button>

<button class="icon-btn" onclick="setIcon('srdce.png', this)">
<img src="srdce.png">
</button>

<button class="icon-btn" onclick="setIcon('medved.png', this)">
<img src="medved.png">
</button>

<button class="icon-btn" onclick="setIcon('hviezda.png', this)">
<img src="hviezda.png">
</button>

<button class="icon-btn" onclick="setIcon('zajko.png', this)">
<img src="zajko.png">
</button>

</div>

</div>

<div class="info">
Každé tričko vyrábame individuálne podľa zvoleného návrhu.
</div>

<button class="order-btn">
Pokračovať k objednávke
</button>

</div>

</div>

<script>

/* STATIC */

function triggerStatic(){

const shirt =
document.getElementById('shirtImage');

shirt.classList.remove('tv-static');

void shirt.offsetWidth;

shirt.classList.add('tv-static');

}

/* UPDATE */

function updatePreview(){

const text =
document.getElementById('previewText');

const content =
document.getElementById('embroideryContent');

const previewIcon =
document.getElementById('previewIcon');

let input =
document.getElementById('textInput').value;

text.innerText = input;

const hasIcon =
previewIcon.style.opacity === '1';

content.style.gap =
hasIcon ? '5px' : '0px';

const totalChars =
input.replace(/\n/g,'').length;

const hasEnter =
input.includes('\n');

let size = 34;

if(totalChars > 4) size = 30;
if(totalChars > 8) size = 24;
if(totalChars > 12) size = 18;
if(totalChars > 16) size = 14;

if(hasEnter){

size += 4;

}

text.style.fontSize =
size + 'px';

}

/* FONT */

function setFont(font, btn){

document.querySelectorAll('.font-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

document.getElementById('previewText').style.fontFamily =
font;

updatePreview();

triggerStatic();

}

/* THREAD */

function setThreadColor(color, el){

document.getElementById('previewText').style.color =
color;

document.querySelectorAll('.color').forEach(c=>{
c.classList.remove('active-color');
});

el.classList.add('active-color');

triggerStatic();

}

/* ICON */

function setIcon(icon, btn){

document.querySelectorAll('.icon-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

const previewIcon =
document.getElementById('previewIcon');

previewIcon.src = icon;

previewIcon.style.opacity = '1';

updatePreview();

triggerStatic();

}

/* REMOVE ICON */

function removeIcon(btn){

document.querySelectorAll('.icon-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

const previewIcon =
document.getElementById('previewIcon');

previewIcon.style.opacity = '0';

updatePreview();

triggerStatic();

}

/* SHIRT */

function setShirt(color, btn){

document.querySelectorAll('.shirt-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

const img =
document.getElementById('shirtImage');

const text =
document.getElementById('previewText');

document.querySelectorAll('.color').forEach(c=>{
c.classList.remove('active-color');
});

if(color === 'white'){

img.src = 'biele tricko.png';

text.style.color = 'black';

document.querySelector('.color[onclick*="black"]').classList.add('active-color');

}else{

img.src = 'cierne tricko.png';

text.style.color = 'white';

document.querySelector('.color[onclick*="white"]').classList.add('active-color');

}

triggerStatic();

}

/* SIZE */

document.querySelectorAll('.size-btn').forEach(btn=>{

btn.addEventListener('click',()=>{

document.querySelectorAll('.size-btn').forEach(b=>{
b.classList.remove('active');
});

btn.classList.add('active');

triggerStatic();

});

});

</script>

</body>
</html>
