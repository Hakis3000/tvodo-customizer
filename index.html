<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVODO – Customizer</title>

<style>
body{
    margin:0;
    background:#f3f3f3;
    font-family:Poppins, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* pevný papier */
.canvas{
    width:100%;
    max-width:520px;
    aspect-ratio:3 / 4;
    background:white;
    border-radius:22px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    position:relative;
    overflow:hidden;
}

/* tričko vyplní celý papier, bez zoomu */
.product-image{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

/* FIXNÝ ŠTVOREC – tu bude výšivka
   11 cm ≈ 416 px, môžeš doladiť */
.embroidery-area{
    position:absolute;
    width:416px;
    height:416px;
    /* tu doladíme polohu na prsiach */
    top:170px;      /* posuň hore/dole */
    left:50%;
    transform:translateX(-50%);

    border:2px dashed rgba(255,124,198,0.55);
    border-radius:18px;
    box-sizing:border-box;
    pointer-events:none;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

.icon-layer{
    width:60px;
    height:60px;
    object-fit:contain;
    display:none;
    margin-bottom:8px;
}

.text-layer{
    font-family:'Montserrat', sans-serif;
    font-size:22px;
    font-weight:700;
    color:#ff7cc6;
    white-space:pre-line;
    text-align:center;
    line-height:1.1;
}
</style>
</head>

<body>

<div class="canvas">

    <!-- TRIČKO -->
    <img id="productImage" class="product-image" src="tricko.svg">

    <!-- FIXNÝ VÝŠIVKOVÝ ŠTVOREC -->
    <div class="embroidery-area">
        <img id="iconLayer" class="icon-layer" src="">
        <div id="textLayer" class="text-layer"></div>
    </div>

</div>

<script>
// zatiaľ žiadny zoom – štvorec ostáva 100 % fixný
</script>

</body>
</html>
