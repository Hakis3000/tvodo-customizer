<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVODO – Customizer</title>

<style>

body{
    margin:0;
    background:#f3f3f3;
    font-family:Poppins, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* ======== PEVNÝ PAPIER (CANVAS) ======== */
.canvas{
    width:100%;
    max-width:520px;
    aspect-ratio: 3 / 4;
    background:white;
    border-radius:22px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    position:relative;
    overflow:hidden;
}

/* ======== TRIČKO – zoomuje sa iba ono ======== */
.product-image{
    width:100%;
    height:100%;
    object-fit:cover; /* 🔥 tričko vyplní celý papier */
    transform-origin:center center;
    transition:transform 0.2s ease-out;
    position:absolute;
    top:0;
    left:0;
}

/* ======== VÝŠIVKOVÝ ŠTVOREC 11×11 cm ======== */
.embroidery-area{
    position:absolute;
    width:416px;   /* 11 cm */
    height:416px;  /* 11 cm */
    top:180px;     /* nastavíme podľa trička */
    left:50%;
    transform:translateX(-50%);
    border:2px dashed rgba(255, 124, 198, 0.45);
    border-radius:14px;
    pointer-events:none;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

/* ikonka */
.icon-layer{
    width:60px;
    height:60px;
    object-fit:contain;
    display:none;
    margin-bottom:8px;
}

/* text */
.text-layer{
    font-family:'Montserrat';
    font-size:22px;
    font-weight:700;
    color:#ff7cc6;
    white-space:pre-line;
    text-align:center;
    line-height:1.1;
}

/* ======== ZOOM TLAČIDLÁ ======== */
.zoom-controls{
    position:absolute;
    bottom:16px;
    right:16px;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.zoom-controls button{
    width:42px;
    height:42px;
    border:none;
    border-radius:12px;
    background:#ffffff;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    font-size:22px;
    cursor:pointer;
    transition:0.15s;
}

.zoom-controls button:hover{
    transform:scale(1.08);
}

</style>
</head>

<body>

<div class="canvas">

    <!-- TRIČKO -->
    <img id="productImage" class="product-image" src="tricko.png">

    <!-- VÝŠIVKOVÝ ŠTVOREC -->
    <div class="embroidery-area">
        <img id="iconLayer" class="icon-layer" src="">
        <div id="textLayer" class="text-layer"></div>
    </div>

    <!-- ZOOM -->
    <div class="zoom-controls">
        <button id="zoomIn">+</button>
        <button id="zoomOut">−</button>
        <button id="zoomReset">⟳</button>
    </div>

</div>

<script>

/* ======== ZOOM FUNGUJE IBA NA TRIČKO ======== */

let zoom = 1;
const product = document.getElementById("productImage");

document.getElementById("zoomIn").onclick = ()=>{
    zoom = Math.min(zoom + 0.1, 3);
    product.style.transform = `scale(${zoom})`;
};

document.getElementById("zoomOut").onclick = ()=>{
    zoom = Math.max(zoom - 0.1, 0.5);
    product.style.transform = `scale(${zoom})`;
};

document.getElementById("zoomReset").onclick = ()=>{
    zoom = 1;
    product.style.transform = `scale(1)`;
};

</script>

</body>
</html>
