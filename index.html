<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVODO – Customizer</title>

<style>

/* ======== POZADIE STRÁNKY ======== */
body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:linear-gradient(135deg, #ffe6f5, #d9eaff);
    animation:bgMove 12s infinite alternate ease-in-out;
    display:flex;
    flex-direction:column;
    align-items:center;
}
@keyframes bgMove{
    0%{ background-position:0% 50%; }
    100%{ background-position:100% 50%; }
}

/* ======== TOPBAR ======== */
.topbar{
    width:100%;
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
    background:rgba(255,255,255,0.4);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.4);
    position:sticky;
    top:0;
    z-index:10;
}
.topbar .item{
    padding:12px 22px;
    background:white;
    border-radius:14px;
    border:2px solid #ffb8e6;
    cursor:pointer;
    transition:0.25s;
    font-weight:600;
}
.topbar .item:hover{
    background:#ffcef0;
    transform:translateY(-4px) scale(1.05);
}

/* ======== HLAVNÝ CONTAINER (1200 px) ======== */
.container{
    width:1200px;
    margin-top:40px;
    display:grid;
    grid-template-columns:350px 1fr;
    gap:40px;
}

/* ======== PANEL ======== */
.panel{
    display:flex;
    flex-direction:column;
    gap:25px;
    padding:20px;
    border-radius:16px;
    background:rgba(255,255,255,0.5);
    backdrop-filter:blur(8px);
}

/* ======== SEKČNÉ NADPISY ======== */
.section-title{
    font-weight:700;
    font-size:18px;
    display:flex;
    align-items:center;
    gap:8px;
}

/* ======== INFO IKONKA ======== */
.info{
    width:18px;
    height:18px;
    background:#ff7cc6;
    color:white;
    border-radius:50%;
    font-size:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    position:relative;
}
.info:hover::after{
    content:attr(data-tip);
    position:absolute;
    top:25px;
    left:0;
    background:#333;
    color:white;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
    white-space:nowrap;
}

/* ======== TLAČIDLÁ ======== */
.btn-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}
.btn{
    padding:10px 16px;
    background:#f7f7f7;
    border-radius:10px;
    border:2px solid #ddd;
    cursor:pointer;
    transition:0.2s;
    font-weight:600;
}
.btn:hover{
    background:#ffe6f5;
    border-color:#ff7cc6;
}
.btn.active{
    background:#ffcef0;
    border-color:#ff7cc6;
    transform:scale(1.05);
}

/* ======== CANVAS ======== */
.canvas{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

svg{
    max-width:100%;
    height:auto;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="item">Body</div>
    <div class="item">Tričko</div>
    <div class="item">Bryndáčik</div>
    <div class="item">Uterák</div>
</div>

<!-- HLAVNÝ CONTAINER -->
<div class="container">

    <!-- PANEL -->
    <div class="panel">

        <div>
            <div class="section-title">
                Farba trička
                <div class="info" data-tip="Vyber farbu trička.">i</div>
            </div>
            <div class="btn-row" id="shirtColors">
                <div class="btn" data-color="#ffffff">Biela</div>
                <div class="btn" data-color="#000000" style="color:white;">Čierna</div>
            </div>
        </div>

        <div>
            <div class="section-title">
                Veľkosť
                <div class="info" data-tip="Vyber veľkosť.">i</div>
            </div>
            <div class="btn-row" id="sizes">
                <div class="btn">S</div>
                <div class="btn">M</div>
                <div class="btn">L</div>
                <div class="btn">XL</div>
                <div class="btn">2XL</div>
            </div>
        </div>

        <div>
            <div class="section-title">
                Farba nite
                <div class="info" data-tip="Vyber farbu výšivky.">i</div>
            </div>
            <div class="btn-row" id="threadColors">
                <div class="btn" data-thread="#000000">Čierna</div>
                <div class="btn" data-thread="#ffffff">Biela</div>
                <div class="btn" data-thread="#ff7cc6">Ružová</div>
                <div class="btn" data-thread="#00aaff">Modrá</div>
                <div class="btn" data-thread="#ffaa00">Oranžová</div>
                <div class="btn" data-thread="#00cc66">Zelená</div>
            </div>
        </div>

        <div>
            <div class="section-title">
                Štýl písma
                <div class="info" data-tip="Vyber štýl textu.">i</div>
            </div>
            <div class="btn-row" id="fonts">
                <div class="btn" data-font="Poppins">Klasický</div>
                <div class="btn" data-font="'Comic Sans MS'">Hravý</div>
                <div class="btn" data-font="'Brush Script MT'">Písaný</div>
            </div>
        </div>

        <div>
            <div class="section-title">
                Text
                <div class="info" data-tip="Napíš text, ktorý sa zobrazí na tričku.">i</div>
            </div>
            <input id="textInput" maxlength="16" placeholder="Tvoj text">
        </div>

    </div>

    <!-- PREVIEW -->
    <div class="canvas">
        <svg id="mainSVG" viewBox="0 0 512 700" width="100%">

            <rect id="shirtFill" x="80" y="80" width="350" height="500" rx="40" fill="#ffffff"></rect>

            <g transform="translate(0,0) scale(1)">
                <path d="M314.56,48S291.78,56,256,56s-58.56-8-58.56-8a31.94,31.94,0,0,0-10.57,1.8L32,104l16.63,88,48.88,5.52A24,24,0,0,1,118.8,222.1L112,464H400l-6.8-241.9a24,24,0,0,1,21.29-24.58L463.37,192,480,104,325.13,49.8A31.94,31.94,0,0,0,314.56,48Z"
                      fill="none" stroke="#000" stroke-width="8"/>
            </g>

            <rect id="frame"
                  x="250" y="200" width="120" height="120"
                  fill="none"
                  stroke="#ff7cc6"
                  stroke-width="2"
                  stroke-dasharray="1 6"
                  opacity="0.5"
                  rx="10"/>

            <text id="svgText"
                  x="310" y="240"
                  text-anchor="middle"
                  font-family="Poppins"
                  font-size="26"
                  font-weight="600"
                  fill="#000">

                <tspan id="line1" x="310" dy="0"></tspan>
                <tspan id="line2" x="310" dy="28"></tspan>

            </text>

        </svg>
    </div>

</div>

<script>

/* ======== TEXT ======== */
const input = document.getElementById("textInput");
const l1 = document.getElementById("line1");
const l2 = document.getElementById("line2");

input.addEventListener("input", () => {
    let text = input.value.trim();
    const words = text.split(" ");

    let line1 = "";
    let line2 = "";

    for (let w of words) {
        if ((line1 + " " + w).trim().length <= 8) {
            line1 = (line1 + " " + w).trim();
        } else if ((line2 + " " + w).trim().length <= 8) {
            line2 = (line2 + " " + w).trim();
        }
    }

    l1.textContent = line1;
    l2.textContent = line2;
});

/* ======== FARBA TRIČKA ======== */
document.querySelectorAll("#shirtColors .btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        document.querySelectorAll("#shirtColors .btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("shirtFill").setAttribute("fill", btn.dataset.color);
    });
});

/* ======== VEĽKOSŤ ======== */
document.querySelectorAll("#sizes .btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        document.querySelectorAll("#sizes .btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
    });
});

/* ======== FARBA NITE ======== */
document.querySelectorAll("#threadColors .btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        document.querySelectorAll("#threadColors .btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("svgText").setAttribute("fill", btn.dataset.thread);
    });
});

/* ======== FONT ======== */
document.querySelectorAll("#fonts .btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        document.querySelectorAll("#fonts .btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("svgText").setAttribute("font-family", btn.dataset.font);
    });
});

</script>

</body>
</html>
