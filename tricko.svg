<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVODO – Customizer</title>

<style>

body{
    margin:0;
    background:#f3f3f3;
    font-family:Poppins, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* ======== PAPIER ======== */
.canvas{
    width:100%;
    max-width:520px;
    aspect-ratio:3/4;
    background:white;
    border-radius:22px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    position:relative;
    overflow:hidden;
}

/* ======== TRIČKO – správne vypasované ======== */
.shirt-wrapper{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

.shirt-wrapper svg{
    width:100%;
    height:100%;
    object-fit:contain; /* 🔥 nič sa neoreže */
}

/* ======== RÁMČEK – jemné malé ružové bodky ======== */
.frame-wrapper{
    position:absolute;

    width:26%;
    aspect-ratio:1/1;

    top:38%;
    left:70%;
    transform:translate(-50%, -50%);

    pointer-events:none;
}

.frame-wrapper svg{
    width:100%;
    height:100%;
}

.frame-wrapper rect{
    fill:transparent;
    stroke:#ff7cc6;
    stroke-width:3;

    /* MALÉ JEMNÉ BODKY */
    stroke-dasharray:0.5 12;
    stroke-linecap:round;

    rx:10;
}

</style>
</head>

<body>

<div class="canvas">

    <!-- TRIČKO – vložené ako inline SVG -->
    <div class="shirt-wrapper">
        <!-- sem vložíme celý obsah tricko.svg -->
        <svg viewBox="0 0 5000 3000">
            <!-- sem vlož celý obsah svojho SVG (cesty, tvary, skupiny) -->
        </svg>
    </div>

    <!-- RÁMČEK -->
    <div class="frame-wrapper">
        <svg viewBox="0 0 100 100">
            <rect x="0" y="0" width="100" height="100"></rect>
        </svg>
    </div>

</div>

</body>
</html>
